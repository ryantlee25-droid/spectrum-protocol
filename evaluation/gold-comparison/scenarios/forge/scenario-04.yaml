scenario_id: "forge-04"
gold_phase: "forge"
difficulty: "hard"
description: "Environmental failure + circuit breaker: Python dependency conflict in CI container; two prior failures on same locus trigger circuit breaker escalation"

hook_md_excerpt: |
  ## Status: failed
  ## Task
  howler-ml-pipeline: implement feature extraction pipeline using scikit-learn

  ## Errors Encountered (attempt 3)
  - ERROR: pip's dependency resolver does not currently take into account all the
    packages that are installed. This behaviour is the source of the following
    dependency conflicts.
  - scikit-learn 1.3.0 requires numpy>=1.17.3, but you have numpy 1.16.0 which is incompatible.
  - ERROR: Could not install packages due to an OSError: [Errno 28] No space left on device
  - pip install scikit-learn exited with code 1

  ## Work Completed
  - [ ] Dependencies installed
  - [ ] Feature extraction implemented
  - [ ] Tests passing

  ## Prior Attempts Summary
  Attempt 1: Same numpy conflict. Tried pip install --upgrade numpy but got "No space left on device" after partial upgrade.
  Attempt 2: Tried using conda instead of pip. conda not available in CI container.
  Attempt 3 (current): Tried pip install --no-deps scikit-learn to bypass conflict check. Still fails on disk space.

  ## Alignment: on-track
  Task scope is correct but environment is blocking all installation approaches.

error_context: |
  CI environment: Docker container (python:3.9-slim)
  Available disk: 0 MB (df -h shows /dev/overlay: 100% used)
  numpy currently installed: 1.16.0
  scikit-learn requirement: numpy>=1.17.3
  Conda: not available
  virtualenv: not available
  pip version: 23.3.1

  Prior failures on same locus:
  Attempt 1 (2 hours ago): pip dependency conflict — classified transient by Gold (auto-resumed)
  Attempt 2 (1 hour ago): conda not available — classified transient by Gold (auto-resumed)
  Attempt 3 (current): disk space exhausted + dependency conflict

  Note from CI logs: The Docker layer cache is consuming most disk space.
  Clearing layer cache would free ~15GB. This requires a CI admin action.

failure_history:
  - attempt: 1
    classification: "transient"
    locus: "pip install scikit-learn"
    error: "numpy version conflict"
    gold_action: "auto-resume"
  - attempt: 2
    classification: "transient"
    locus: "pip install scikit-learn"
    error: "conda not available"
    gold_action: "auto-resume"
  - attempt: 3
    classification: null
    locus: "pip install scikit-learn"
    error: "disk space exhausted + dependency conflict"

correct_classification: "environmental"
correct_recovery_action: "skip"
circuit_breaker_applies: true

rationale: |
  Two-part analysis:

  1. CIRCUIT BREAKER: This is attempt 3 on the same locus. The protocol's circuit
     breaker rule states: "2 failures on the same locus auto-escalate the failure type
     to structural — even if the individual failure was classified transient or logical.
     Gold pauses and escalates to human instead of dropping a third Howler."
     Attempts 1 and 2 were both on locus "pip install scikit-learn" — the circuit
     breaker triggers. Gold must escalate to human, not auto-recover.

  2. CLASSIFICATION: The root cause is environmental — the CI container has:
     - Exhausted disk space (CI infrastructure issue)
     - Requires admin action (clear Docker layer cache) to resolve
     - Not fixable by code changes
     - Not fixable by rewriting the task or contract
     Environmental failures are caused by infrastructure issues outside the codebase.

  Correct action: escalate to human with circuit breaker triggered. Present options:
  - Skip (defer ML pipeline until CI environment is fixed)
  - Restructure to use lighter dependencies (avoid scikit-learn)
  - Fix environment (operator clears Docker cache, then resume)

  Gold should NOT auto-resume or auto-retry (circuit breaker prohibits this).

  Why not structural: structural means the decomposition is wrong. The task scope is
  correct (the plan is valid). The problem is the execution environment.

  Why not logical: logical means code logic is wrong. No code was written yet.

  Why not conflict: no git conflicts involved.

  Wrong answers:
  - circuit_breaker_applies: false — incorrect; 2 prior failures on same locus = trigger
  - correct_recovery_action: resume — incorrect; circuit breaker prohibits auto-recovery
  - correct_classification: structural — incorrect; task scope is fine, environment is broken

scoring_notes: |
  Hard scenario testing the circuit breaker rule specifically.

  The key insight: Gold incorrectly classified attempts 1 and 2 as transient (and
  auto-resumed both times). This was arguably wrong (conda not available is environmental,
  not transient). But regardless of whether those earlier classifications were correct,
  the circuit breaker now applies.

  A Gold that doesn't know the circuit breaker rule will classify attempt 3 as
  environmental and recommend "resume with disk cleanup instructions" — missing that
  the protocol requires HUMAN escalation after 2 failures on the same locus.

  The test: does Gold correctly identify circuit_breaker_applies: true AND recommend
  human escalation instead of auto-recovery?

  Also tests: was Gold's earlier classification of attempt 1 as "transient" correct?
  Dependency conflict (numpy version pinned) is probably environmental, not transient.
  A discriminating Gold might note that the circuit breaker was triggered partly because
  earlier failures were misclassified.
