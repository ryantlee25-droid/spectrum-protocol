scenario_id: "forge-05"
gold_phase: "forge"
difficulty: "hard"
description: "Git merge conflict failure: ambiguous boundary with structural — Howler's branch has actual merge conflicts but the underlying cause is a contract violation by a different Howler"

hook_md_excerpt: |
  ## Status: failed
  ## Task
  howler-feature-flags: implement feature flag evaluation engine

  ## Errors Encountered
  - MERGE CONFLICT: Auto-merging src/config/app-config.ts
    CONFLICT (content): Merge conflict in src/config/app-config.ts
    Automatic merge failed; fix conflicts and then commit the result.
  - git merge spectrum/feat-0331/howler-shared-config exited with code 1
  - 23 conflicts in src/config/app-config.ts

  ## Work Completed
  - [x] Created src/feature-flags/FlagEvaluator.ts
  - [x] Created src/feature-flags/FlagStore.ts
  - [x] Created src/feature-flags/index.ts
  - [ ] Merged with main branch (blocked on conflicts)

  ## Conflict Detail
  src/config/app-config.ts has 23 conflict markers. The file in my branch adds:
    featureFlags: { defaultEnabled: false, storageBackend: 'redis' }
  The file in howler-shared-config's branch adds:
    featureFlags: { rolloutPercentages: { new_ui: 0.1 }, killSwitches: ['old_payment'] }
  Both branches modified the same config section for feature flags.

  ## Contract Reference
  MANIFEST.md shows src/config/app-config.ts is owned by howler-shared-config (MODIFIES).
  My task description said to add feature flag defaults to app-config.ts.

error_context: |
  MANIFEST.md extract:
    howler-shared-config:
      MODIFIES: [src/config/app-config.ts]
      note: "adds shared service configs including feature flag defaults"

    howler-feature-flags:
      CREATES: [src/feature-flags/FlagEvaluator.ts, src/feature-flags/FlagStore.ts, src/feature-flags/index.ts]
      note: "pure-create, no shared file modifications"

  The drop prompt Gold gave howler-feature-flags included:
    "You may need to add the featureFlags configuration section to app-config.ts"

  This instruction contradicted MANIFEST.md (app-config.ts owned by howler-shared-config).
  Both Howlers modified app-config.ts independently on their branches. Now merging
  produces conflicts.

  howler-shared-config status: PR open, not yet merged. Contains app-config.ts changes.
  howler-feature-flags: trying to merge with shared-config's branch before PR merges.

failure_history:
  - attempt: 1
    classification: null
    locus: "src/config/app-config.ts"
    error: "23 merge conflicts"

correct_classification: "conflict"
correct_recovery_action: "restructure"
circuit_breaker_applies: false

rationale: |
  This is a "conflict" failure type — actual git merge conflicts from concurrent branch edits.

  However, the UNDERLYING CAUSE is structural (Gold gave contradictory drop instructions,
  same as scenario-03). This is the key distinction:
  - The SYMPTOM is a git conflict (23 conflict markers)
  - The ROOT CAUSE is a planning error (Gold told howler-feature-flags to modify a
    file owned by howler-shared-config)

  For CLASSIFICATION, use the failure type that describes what happened, not the root cause:
  - The Howler failed due to an irresolvable git merge conflict
  - classification: "conflict"

  For RECOVERY, the structural root cause determines the action:
  - Simply resolving conflict markers would produce incorrect output (both sets of
    feature flag config in the same file, with incorrect ownership semantics)
  - The correct fix is to restructure: establish clean ownership and have howler-shared-config
    add all feature flag defaults, with howler-feature-flags reading from the config
    (not writing to it)
  - recovery_action: "restructure"

  This scenario intentionally creates a "conflict" classification with "restructure" recovery,
  which is an unusual pairing (conflict normally maps to resume with conflict resolution).
  The unusual pairing is correct here because the conflict cannot be resolved without
  fixing the underlying ownership violation.

  circuit_breaker_applies: false — first failure on this locus.

  Comparison with scenario-03:
  - scenario-03: structural failure (Howler blocked BEFORE touching the file)
  - scenario-05 (this): conflict failure (Howler already made changes, now has git conflicts)
  The distinction matters: in scenario-03, the Howler correctly blocked. Here, the
  Howler proceeded (incorrectly) and created a git conflict.

scoring_notes: |
  Hard scenario. Three-way ambiguity: conflict vs structural vs logical.

  The right answer requires Gold to:
  1. Classify the immediate failure as "conflict" (git conflicts are the failure mode)
  2. Identify that "restructure" is still the right recovery (because conflict resolution
     alone doesn't fix the ownership problem)
  3. Explain that the root cause is structural (contradictory drop instructions) even
     though the classification is "conflict"

  A Sonnet Gold might:
  - Classify as structural (root cause) and recommend restructure (recovery correct)
  - Classify as conflict (symptom) and recommend resume with conflict resolution (recovery wrong)
  - Miss that a restructure is needed even for a "conflict" classification

  The full-credit answer: conflict classification, restructure recovery, notes that
  the root cause is a structural planning error that created the conflict, and recommends
  Gold issue a corrective drop to howler-shared-config with explicit ownership of the
  entire featureFlags config section.
