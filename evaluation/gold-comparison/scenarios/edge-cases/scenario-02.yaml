num_howlers: 3

expected_file_ownership:
  - file: "src/repositories/ViewHistoryRepository.ts"
    howler: "howler-users"
    action: "CREATES"
    rationale: >
      View history is a user behavior artifact. The query pattern (get recent views
      for a userId) is user-centric. Assigning to howler-users aligns with
      single-responsibility: user behaviors live in the user domain.
  - file: "src/db/migrations/add_user_product_views.sql"
    howler: "howler-users"
    action: "CREATES"
  - file: "src/api/viewHistoryRoutes.ts"
    howler: "howler-users"
    action: "CREATES"
  - file: "src/components/RecentlyViewedWidget.tsx"
    howler: "howler-frontend"
    action: "CREATES"
  - file: "src/components/RecentlyViewedSection.tsx"
    howler: "howler-frontend"
    action: "CREATES"
  - file: "src/hooks/useViewHistory.ts"
    howler: "howler-frontend"
    action: "CREATES"

known_conflicts:
  - file: "src/repositories/ViewHistoryRepository.ts"
    naive_howlers: ["howler-products", "howler-users"]
    correct_resolution: >
      Assign to howler-users. The repository queries by userId (user-centric access pattern).
      howler-products could also claim ownership (references ProductId), but the primary
      access pattern (get recent views FOR a user) puts this in the user domain.
      Either assignment avoids a conflict — the conflict arises if neither Howler is
      assigned and both create the file independently.
  - file: "src/api/viewHistoryRoutes.ts"
    naive_howlers: ["howler-products", "howler-users"]
    correct_resolution: >
      Assign to howler-users. The route GET /users/:id/recently-viewed is a sub-resource
      of the user API. A naive decomposition might have howler-products create
      GET /products/recently-viewed/:userId (product-centric URL), creating two
      routes for the same data from different perspectives.

expected_dag_edges:
  - from: "howler-frontend"
    to: "howler-users"
    type: "types"
    note: "Frontend components import ViewHistory type and useViewHistory hook depends on the API route"

expected_contract_sections:
  - section: "ownership_rationale"
    must_include:
      - "ViewHistoryRepository owned by howler-users (user-centric access pattern)"
      - "howler-products does not own ViewHistoryRepository"
  - section: "shared_types"
    must_include:
      - "ViewRecord: { productId: string; viewedAt: number }"
      - "ViewHistory: { userId: string; recentViews: ViewRecord[] }"
  - section: "api_contract"
    must_include:
      - "GET /users/:id/recently-viewed returns ViewHistory"

scoring_notes: |
  Edge case: ambiguous task boundary. There is no single objectively correct answer
  for which Howler owns ViewHistoryRepository — the key requirement is that EXACTLY ONE
  Howler owns it (no conflict) and the rationale is documented.

  Scoring approach (special case):
  - Full credit: assigns ViewHistoryRepository to ONE Howler with clear rationale,
    documents the ownership decision in CONTRACT.md, ensures howler-products does NOT
    also create it
  - Partial credit: assigns correctly but omits rationale in CONTRACT
  - Zero credit: leaves ownership ambiguous (both Howlers might claim it), or
    assigns to a non-existent new Howler without justification

  The Politico integration test: a correct Gold should also note this as a boundary
  judgment call in the Politico review section, flagging it as a high-risk seam
  that should be confirmed before freeze.

  This scenario tests whether Gold produces clear ownership decisions for ambiguous
  join-entity cases, which is one of the hardest parts of decomposition.
