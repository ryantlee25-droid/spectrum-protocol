scenario_id: "edge-02"
gold_phase: "muster"
difficulty: "hard"
description: "Ambiguous task boundary: a feature that straddles two natural domains — Gold must decide ownership, and the wrong choice creates a latent integration risk"

task_description: |
  Add a 'recently viewed products' feature to the e-commerce app. Users should see
  their last 10 viewed products on their profile page and in a sidebar widget. The
  feature requires:
  1. Tracking product views (recording when a user views a product detail page)
  2. Storing view history (persisted, not just session-local)
  3. Retrieving view history (for the profile page)
  4. Displaying view history (sidebar widget and profile page component)

  The team is split into two domain Howlers: howler-products (owns product domain) and
  howler-users (owns user domain). A third Howler handles frontend components.

plan_excerpt: |
  ## Task: Recently Viewed Products Feature

  ### Backend
  - Track product views: record UserProductView(userId, productId, viewedAt)
  - Persist to database: user_product_views table
  - Query: get last 10 views for a userId

  ### Frontend
  - RecentlyViewedWidget — sidebar component showing last 5 products
  - RecentlyViewedSection — full list on profile page

  ### Current domain owners
  - howler-products: owns ProductRepository, ProductCard, product-related API routes
  - howler-users: owns UserRepository, UserProfile, user-related API routes
  - howler-frontend: owns layout components and composite page components

  ### The ambiguity
  UserProductView is a join entity: belongs to both User domain (it's a user behavior)
  and Product domain (it references products). Either domain Howler could plausibly own it.

