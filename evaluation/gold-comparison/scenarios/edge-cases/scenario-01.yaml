scenario_id: "edge-01"
gold_phase: "pax"
difficulty: "hard"
description: "Context window pressure: 8-Howler debrief set where the critical deviation is in the last Howler's debrief — tests whether Gold synthesizes all debriefs or truncates under token pressure"

# This scenario has an unusually large debrief_set. The injected deviation is
# intentionally placed in the LAST howler debrief to test whether Gold reads all
# debriefs or gives up partway through a large context.

contract_md: |
  ## Shared Types
  - RequestContext: { requestId: string; userId: string; tenantId: string; timestamp: number }
  - AuditEvent: { action: string; resourceType: string; resourceId: string; context: RequestContext }

  ## Postconditions

  ### howler-request-context
  - exports RequestContext type and createContext(req) factory
  - context.requestId is a UUID v4

  ### howler-audit-log
  - exports logAudit(event: AuditEvent): Promise<void>
  - writes to audit_events table with full RequestContext

  ### howler-user-crud
  - all user mutations emit AuditEvent via logAudit()
  - AuditEvent.resourceType = 'user' for all user operations

  ### howler-tenant-crud
  - all tenant mutations emit AuditEvent via logAudit()
  - AuditEvent.resourceType = 'tenant'

  ### howler-billing
  - all billing operations emit AuditEvent via logAudit()
  - AuditEvent.resourceType = 'billing'

  ### howler-permissions
  - all permission grants/revocations emit AuditEvent via logAudit()
  - AuditEvent.resourceType = 'permission'

  ### howler-webhooks
  - all webhook registrations emit AuditEvent via logAudit()
  - AuditEvent.resourceType = 'webhook'

  ### howler-api-gateway
  - injects RequestContext into all incoming requests via middleware
  - RequestContext.tenantId extracted from JWT claim 'tid'
  - CRITICAL: context.requestId must be regenerated per-request (never reused)

debrief_set:
  - howler: "howler-request-context"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - createContext used by howler-api-gateway
    debrief: "RequestContext and createContext implemented. requestId is UUID v4."
    files_created:
      - path: "src/context/RequestContext.ts"
        content: |
          import { v4 as uuidv4 } from 'uuid';
          export interface RequestContext {
            requestId: string;
            userId: string;
            tenantId: string;
            timestamp: number;
          }
          export function createContext(req: any): RequestContext {
            return {
              requestId: uuidv4(),
              userId: req.user?.id ?? 'anonymous',
              tenantId: req.tenantId ?? 'default',
              timestamp: Date.now(),
            };
          }

  - howler: "howler-audit-log"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - logAudit imported by all mutation Howlers
    debrief: "logAudit implemented. Writes to audit_events table with full context."
    files_created:
      - path: "src/audit/AuditLog.ts"
        content: |
          import { RequestContext } from '../context/RequestContext';
          export interface AuditEvent {
            action: string;
            resourceType: string;
            resourceId: string;
            context: RequestContext;
          }
          export async function logAudit(event: AuditEvent): Promise<void> {
            await db.audit_events.create({ data: { ...event, ...event.context } });
          }

  - howler: "howler-user-crud"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - emits AuditEvent with resourceType 'user'
    debrief: "User CRUD with audit logging. resourceType correctly set to 'user'."
    files_created:
      - path: "src/services/UserService.ts"
        content: |
          import { logAudit } from '../audit/AuditLog';
          export async function createUser(data: any, ctx: any) {
            const user = await db.users.create({ data });
            await logAudit({ action: 'user.create', resourceType: 'user', resourceId: user.id, context: ctx });
            return user;
          }
          export async function deleteUser(id: string, ctx: any) {
            await db.users.delete({ where: { id } });
            await logAudit({ action: 'user.delete', resourceType: 'user', resourceId: id, context: ctx });
          }

  - howler: "howler-tenant-crud"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - emits AuditEvent with resourceType 'tenant'
    debrief: "Tenant CRUD with audit logging. resourceType 'tenant'."
    files_created:
      - path: "src/services/TenantService.ts"
        content: |
          import { logAudit } from '../audit/AuditLog';
          export async function createTenant(data: any, ctx: any) {
            const tenant = await db.tenants.create({ data });
            await logAudit({ action: 'tenant.create', resourceType: 'tenant', resourceId: tenant.id, context: ctx });
            return tenant;
          }

  - howler: "howler-billing"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - emits AuditEvent with resourceType 'billing'
    debrief: "Billing operations with audit logging. resourceType 'billing'."
    files_created:
      - path: "src/services/BillingService.ts"
        content: |
          import { logAudit } from '../audit/AuditLog';
          export async function chargeSubscription(tenantId: string, amount: number, ctx: any) {
            const result = await stripe.charges.create({ amount, currency: 'usd' });
            await logAudit({ action: 'billing.charge', resourceType: 'billing', resourceId: result.id, context: ctx });
            return result;
          }

  - howler: "howler-permissions"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - emits AuditEvent with resourceType 'permission'
    debrief: "Permission grants/revocations with audit logging. resourceType 'permission'."
    files_created:
      - path: "src/services/PermissionService.ts"
        content: |
          import { logAudit } from '../audit/AuditLog';
          export async function grantPermission(userId: string, permission: string, ctx: any) {
            await db.permissions.create({ data: { userId, permission } });
            await logAudit({ action: 'permission.grant', resourceType: 'permission', resourceId: userId, context: ctx });
          }

  - howler: "howler-webhooks"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - emits AuditEvent with resourceType 'webhook'
    debrief: "Webhook registrations with audit logging. resourceType 'webhook'."
    files_created:
      - path: "src/services/WebhookService.ts"
        content: |
          import { logAudit } from '../audit/AuditLog';
          export async function registerWebhook(url: string, events: string[], ctx: any) {
            const wh = await db.webhooks.create({ data: { url, events } });
            await logAudit({ action: 'webhook.register', resourceType: 'webhook', resourceId: wh.id, context: ctx });
            return wh;
          }

  - howler: "howler-api-gateway"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - injects RequestContext into all requests
      - requestId is regenerated per request
    debrief: |
      API gateway middleware injects RequestContext. tenantId extracted from JWT 'tid' claim.
      requestId regenerated per request. CONTRACT.md postconditions fully met.
    files_created:
      - path: "src/gateway/middleware.ts"
        content: |
          import jwt from 'jsonwebtoken';
          import { createContext } from '../context/RequestContext';

          // Module-level requestId (BUG: this is reused across requests, not per-request)
          const GATEWAY_REQUEST_ID = require('crypto').randomUUID();

          export function contextMiddleware(req: any, res: any, next: any) {
            const token = req.headers.authorization?.split(' ')[1];
            const decoded = token ? jwt.decode(token) as any : {};
            req.tenantId = decoded?.tid ?? 'default';
            req.user = { id: decoded?.sub };
            // BUG: uses module-level GATEWAY_REQUEST_ID instead of creating fresh context
            req.context = {
              requestId: GATEWAY_REQUEST_ID,
              userId: req.user.id,
              tenantId: req.tenantId,
              timestamp: Date.now(),
            };
            next();
          }

injected_deviations:
  - howler: "howler-api-gateway"
    deviation_type: "invariant_violation"
    description: >
      The CONTRACT CRITICAL invariant: 'context.requestId must be regenerated per-request
      (never reused)'. The implementation creates a module-level UUID (GATEWAY_REQUEST_ID)
      that is assigned at module load time and reused for ALL requests. Every request in
      the system will have the same requestId, making audit logs completely untrustworthy
      for request tracing.
    severity: "blocker"
    location: "src/gateway/middleware.ts — GATEWAY_REQUEST_ID is module-level constant"
    detection_method: >
      Gold must read the last Howler's file (howler-api-gateway) after reading 7
      prior correct debrief entries. The deviation is only findable by inspecting
      the actual file content, not the debrief (which says 'requestId regenerated
      per request' — this is false).

correct_howlers:
  - "howler-request-context"
  - "howler-audit-log"
  - "howler-user-crud"
  - "howler-tenant-crud"
  - "howler-billing"
  - "howler-permissions"
  - "howler-webhooks"

scoring_notes: |
  Edge case: context window pressure test. 8 Howlers, 7 of which are correct.
  The critical bug is in Howler 8 (last in the list).

  Test hypothesis: a model with limited attention or that starts truncating after
  processing 6-7 debriefs will miss the last deviation. The deviation is in the
  LAST howler, the last file, and the debrief explicitly lies ('requestId regenerated
  per request').

  The bug is also architecturally significant: a module-level UUID means ALL audit
  events from ALL requests share the same requestId, breaking the entire audit trail.
  Gold should flag this as a CRITICAL blocker, not just a warning.

  Discriminating signal: does Gold read the actual file for ALL 8 Howlers, or does
  it trust the high-confidence self-reports for later Howlers due to attention fatigue?
