scenario_id: "muster-01"
gold_phase: "muster"
difficulty: "easy"
description: "3-Howler reaping mode: simple blog CMS with no shared types, pure-create tasks"

task_description: |
  Add three new pages to a Next.js blog: an About page, a Contact page, and a 404 error page.
  Each page is standalone with no shared state or components. The project uses Tailwind CSS.
  Use reaping mode — these are pure-create tasks with no interface dependencies.

plan_excerpt: |
  ## Task: Add Static Pages to Blog CMS

  ### Files to create
  - `pages/about.tsx` — static About page with team bios
  - `pages/contact.tsx` — Contact form (UI only, no backend)
  - `pages/404.tsx` — Custom 404 error page

  ### Constraints
  - Each page is standalone; no shared components needed
  - Tailwind CSS only (no new dependencies)
  - No backend changes

codebase_context:
  - path: "pages/index.tsx"
    content: |
      import Head from 'next/head';
      export default function Home() {
        return (
          <div className="container mx-auto">
            <Head><title>My Blog</title></Head>
            <h1 className="text-4xl font-bold">Welcome</h1>
          </div>
        );
      }
  - path: "styles/globals.css"
    content: |
      @tailwind base;
      @tailwind components;
      @tailwind utilities;
  - path: "tailwind.config.js"
    content: |
      module.exports = {
        content: ['./pages/**/*.{ts,tsx}'],
        theme: { extend: {} },
        plugins: [],
      };

num_howlers: 3

expected_file_ownership:
  - file: "pages/about.tsx"
    howler: "howler-about"
    action: "CREATES"
  - file: "pages/contact.tsx"
    howler: "howler-contact"
    action: "CREATES"
  - file: "pages/404.tsx"
    howler: "howler-404"
    action: "CREATES"

known_conflicts: []

expected_dag_edges: []

expected_contract_sections:
  - section: "naming_conventions"
    must_include: ["PascalCase exports", "Tailwind className"]
  - section: "reaping_mode"
    must_include: ["no shared interfaces", "pure-create"]

scoring_notes: |
  This is an easy calibration scenario. A correct decomposition:
  - Uses reaping mode (3 Howlers, pure-create, no deps)
  - Has zero DAG edges (all tasks are independent)
  - Has zero known conflicts (files are disjoint)
  A wrong answer might add unnecessary DAG edges or use full muster ceremony.
