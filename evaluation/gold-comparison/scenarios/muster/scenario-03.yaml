scenario_id: "muster-03"
gold_phase: "muster"
difficulty: "medium"
description: "5-Howler full muster: auth refactor with a latent file conflict on shared types that naive decomposition misses"

task_description: |
  Refactor the authentication system of a Node.js/Express API. Split the monolithic
  auth.ts into separate modules: JWT handling, session management, middleware, and
  an auth router. Additionally, add a password reset flow. All modules share a
  common UserSession type that currently lives inline in auth.ts.

plan_excerpt: |
  ## Task: Auth System Refactor

  ### Current state
  - `src/auth.ts` — 800-line monolith handling JWT, sessions, middleware, and routes

  ### Target structure
  - `src/auth/jwt.ts` — JWT sign/verify utilities
  - `src/auth/session.ts` — session store (Redis-backed)
  - `src/auth/middleware.ts` — Express middleware (requireAuth, requireAdmin)
  - `src/auth/router.ts` — /login, /logout, /refresh routes
  - `src/auth/password-reset.ts` — forgot-password and reset flows
  - `src/types/auth.ts` — shared types (UserSession, JwtPayload, ResetToken)

  ### Key constraint
  UserSession is used by jwt.ts, session.ts, middleware.ts, and router.ts.
  JwtPayload is used by jwt.ts and middleware.ts.
  ResetToken is used only by password-reset.ts.

codebase_context:
  - path: "src/auth.ts"
    content: |
      import jwt from 'jsonwebtoken';
      import { Redis } from 'ioredis';

      // Types currently inline — need extraction
      interface UserSession {
        userId: string;
        roles: string[];
        expiresAt: number;
      }
      interface JwtPayload {
        sub: string;
        roles: string[];
        iat: number;
        exp: number;
      }

      export function signToken(session: UserSession): string { /* ... */ }
      export function verifyToken(token: string): JwtPayload | null { /* ... */ }
      export function requireAuth(req: any, res: any, next: any) { /* ... */ }
      export function requireAdmin(req: any, res: any, next: any) { /* ... */ }
      export function createSession(userId: string, roles: string[]): UserSession { /* ... */ }
      export function destroySession(userId: string): Promise<void> { /* ... */ }
      // ... router handlers ...
  - path: "src/app.ts"
    content: |
      import express from 'express';
      import { requireAuth, requireAdmin } from './auth';
      const app = express();
      app.use('/api', requireAuth);
      export default app;
  - path: "src/types/index.ts"
    content: |
      export * from './user';
      // auth types not yet exported here

num_howlers: 5

expected_file_ownership:
  - file: "src/types/auth.ts"
    howler: "howler-auth-types"
    action: "CREATES"
  - file: "src/auth/jwt.ts"
    howler: "howler-jwt"
    action: "CREATES"
  - file: "src/auth/session.ts"
    howler: "howler-session"
    action: "CREATES"
  - file: "src/auth/middleware.ts"
    howler: "howler-middleware"
    action: "CREATES"
  - file: "src/auth/router.ts"
    howler: "howler-router"
    action: "CREATES"
  - file: "src/auth/password-reset.ts"
    howler: "howler-password-reset"
    action: "CREATES"
  - file: "src/auth/index.ts"
    howler: "howler-auth-types"
    action: "CREATES"
    note: "barrel file, assigned to types howler since it exports shared types"

known_conflicts:
  - file: "src/types/auth.ts"
    naive_howlers: ["howler-jwt", "howler-session", "howler-middleware", "howler-router"]
    correct_resolution: >
      Create a dedicated howler-auth-types that owns src/types/auth.ts and signals
      #types-stable. All other Howlers import from this file. A naive decomposition
      assigns each Howler to define UserSession inline, causing 4-way conflict.
  - file: "src/auth/index.ts"
    naive_howlers: ["howler-jwt", "howler-middleware", "howler-router"]
    correct_resolution: >
      Barrel index.ts must be owned by exactly one Howler (howler-auth-types).
      A naive decomposition has each Howler independently add its exports to index.ts
      causing merge conflicts.

expected_dag_edges:
  - from: "howler-jwt"
    to: "howler-auth-types"
    type: "types"
  - from: "howler-session"
    to: "howler-auth-types"
    type: "types"
  - from: "howler-middleware"
    to: "howler-auth-types"
    type: "types"
  - from: "howler-router"
    to: "howler-auth-types"
    type: "types"
  - from: "howler-password-reset"
    to: "howler-auth-types"
    type: "types"

expected_contract_sections:
  - section: "shared_types"
    must_include: ["UserSession", "JwtPayload", "ResetToken"]
  - section: "postconditions"
    howler: "howler-auth-types"
    must_include: ["exports UserSession", "exports JwtPayload", "exports ResetToken", "signals #types-stable"]
  - section: "postconditions"
    howler: "howler-jwt"
    must_include: ["exports signToken(session: UserSession): string", "exports verifyToken(token: string): JwtPayload | null"]
  - section: "invariants"
    must_include: ["all auth modules import types from src/types/auth.ts only"]

scoring_notes: |
  The key discriminator: does Gold detect that UserSession is needed by 4 of 5 Howlers
  and therefore create a dedicated types Howler that runs first?

  A weak decomposition: 5 Howlers in parallel, each defines UserSession locally.
  This passes a naive eye-test but fails integration (4 incompatible type definitions).

  A correct decomposition:
  - howler-auth-types runs first, owns src/types/auth.ts
  - Signals #types-stable after exporting shared interfaces
  - 4 implementation Howlers run in parallel after types are stable
  - CONTRACT.md includes exact type signatures so no ambiguity

  Difficulty: medium because the conflict is visible in the plan if read carefully,
  but requires Gold to recognize the barrel-file ownership gap as a second conflict.
