scenario_id: "muster-02"
gold_phase: "muster"
difficulty: "easy"
description: "4-Howler reaping mode with one non-obvious serial dependency: i18n strings must be defined before UI components reference them"

task_description: |
  Add internationalization (i18n) support to a React dashboard. Tasks:
  1. Create the i18n string catalog (en.json, es.json)
  2. Build a LanguageSwitcher component
  3. Build a UserGreeting component that uses i18n strings
  4. Build a NotificationBanner component that uses i18n strings

  The string catalog defines keys that all UI components depend on. If UI components
  are built before string keys are finalized, key names may diverge.

plan_excerpt: |
  ## Task: Add i18n to React Dashboard

  ### Deliverables
  - `src/i18n/en.json` — English string catalog
  - `src/i18n/es.json` — Spanish string catalog
  - `src/components/LanguageSwitcher.tsx` — dropdown to switch locale
  - `src/components/UserGreeting.tsx` — "Good morning, {name}" with i18n
  - `src/components/NotificationBanner.tsx` — dismissible banner with i18n strings

  ### Note
  String keys are defined in en.json/es.json. Components must use agreed key names.

codebase_context:
  - path: "src/i18n/index.ts"
    content: |
      import en from './en.json';
      import es from './es.json';
      export const locales = { en, es } as const;
      export type Locale = keyof typeof locales;
      export type StringKey = keyof typeof en;
  - path: "src/hooks/useTranslation.ts"
    content: |
      import { useContext } from 'react';
      import { I18nContext } from '../contexts/I18nContext';
      export function useTranslation() {
        const { locale, strings } = useContext(I18nContext);
        return { t: (key: string) => strings[key] ?? key, locale };
      }
  - path: "src/contexts/I18nContext.tsx"
    content: |
      import React, { createContext, useState } from 'react';
      import { locales, Locale } from '../i18n';
      export const I18nContext = createContext({ locale: 'en' as Locale, strings: locales.en });
      export function I18nProvider({ children }: { children: React.ReactNode }) {
        const [locale, setLocale] = useState<Locale>('en');
        return (
          <I18nContext.Provider value={{ locale, strings: locales[locale] }}>
            {children}
          </I18nContext.Provider>
        );
      }

num_howlers: 4

expected_file_ownership:
  - file: "src/i18n/en.json"
    howler: "howler-i18n-catalog"
    action: "CREATES"
  - file: "src/i18n/es.json"
    howler: "howler-i18n-catalog"
    action: "CREATES"
  - file: "src/components/LanguageSwitcher.tsx"
    howler: "howler-language-switcher"
    action: "CREATES"
  - file: "src/components/UserGreeting.tsx"
    howler: "howler-user-greeting"
    action: "CREATES"
  - file: "src/components/NotificationBanner.tsx"
    howler: "howler-notification-banner"
    action: "CREATES"

known_conflicts: []

expected_dag_edges:
  - from: "howler-language-switcher"
    to: "howler-i18n-catalog"
    type: "types"
    note: "LanguageSwitcher needs the Locale type and string keys to be finalized"
  - from: "howler-user-greeting"
    to: "howler-i18n-catalog"
    type: "types"
    note: "UserGreeting references specific string keys (e.g., greeting_morning)"
  - from: "howler-notification-banner"
    to: "howler-i18n-catalog"
    type: "types"
    note: "NotificationBanner references specific string keys (e.g., dismiss_label)"

expected_contract_sections:
  - section: "shared_types"
    must_include: ["StringKey", "Locale"]
  - section: "string_key_catalog"
    must_include: ["greeting_morning", "greeting_afternoon", "dismiss_label", "language_label"]
  - section: "dag_serial_dependency"
    must_include: ["howler-i18n-catalog must complete #types before UI components start"]

scoring_notes: |
  The non-obvious dependency: string KEY NAMES must be agreed upon before UI components
  code against them. A naive decomposition runs all 4 Howlers in parallel and lets
  each component invent its own key names — causing integration failures.

  Correct Gold output:
  - howler-i18n-catalog has no deps (runs first)
  - After catalog signals #types-stable, 3 UI Howlers drop in parallel
  - CONTRACT.md lists agreed string keys so all UI Howlers use the same names
  - serial_risk: yes on howler-i18n-catalog

  Wrong answer: all 4 Howlers in parallel with no DAG edges (misses the key-name alignment dep).
