scenario_id: "muster-05"
gold_phase: "muster"
difficulty: "hard"
description: "6-Howler full muster: GraphQL API with schema-first design — schema definition creates an ownership conflict that cascades into resolver and client type generation"

task_description: |
  Build a GraphQL API layer for an existing REST backend. The API includes:
  resolvers for users, posts, comments, and search; a subscription service for
  real-time notifications; and a shared schema + generated TypeScript types that
  all resolvers depend on. The frontend team needs a typed Apollo client hook set.

  The GraphQL schema is the single source of truth — all TypeScript types for
  resolvers AND frontend hooks are generated from it via graphql-codegen.

plan_excerpt: |
  ## Task: GraphQL API Layer

  ### Schema and codegen (foundation)
  - `graphql/schema.graphql` — unified schema (types, queries, mutations, subscriptions)
  - `graphql/codegen.yml` — codegen configuration
  - `src/generated/graphql.ts` — generated types (DO NOT edit manually)

  ### Resolvers (parallel after schema)
  - `src/resolvers/userResolver.ts` — User queries and mutations
  - `src/resolvers/postResolver.ts` — Post CRUD + pagination
  - `src/resolvers/commentResolver.ts` — Comment threading
  - `src/resolvers/searchResolver.ts` — Full-text search across types

  ### Real-time (depends on schema + subscription types)
  - `src/subscriptions/notificationSubscription.ts` — WebSocket subscription resolver

  ### Frontend (depends on generated types)
  - `src/hooks/useGraphQL.ts` — typed Apollo hooks generated from schema

codebase_context:
  - path: "src/resolvers/index.ts"
    content: |
      // Currently empty — will merge all resolvers
      export const resolvers = {};
  - path: "package.json"
    content: |
      {
        "dependencies": {
          "graphql": "^16.0.0",
          "apollo-server-express": "^3.0.0",
          "@apollo/client": "^3.0.0",
          "graphql-ws": "^5.0.0"
        },
        "devDependencies": {
          "@graphql-codegen/cli": "^3.0.0",
          "@graphql-codegen/typescript": "^3.0.0",
          "@graphql-codegen/typescript-resolvers": "^3.0.0",
          "@graphql-codegen/typescript-react-apollo": "^3.0.0"
        }
      }
  - path: "src/db/models.ts"
    content: |
      export interface UserRecord { id: string; email: string; displayName: string; createdAt: Date; }
      export interface PostRecord { id: string; authorId: string; title: string; body: string; publishedAt: Date | null; }
      export interface CommentRecord { id: string; postId: string; authorId: string; body: string; createdAt: Date; }

num_howlers: 6

expected_file_ownership:
  - file: "graphql/schema.graphql"
    howler: "howler-schema"
    action: "CREATES"
  - file: "graphql/codegen.yml"
    howler: "howler-schema"
    action: "CREATES"
  - file: "src/generated/graphql.ts"
    howler: "howler-schema"
    action: "CREATES"
    note: "howler-schema runs codegen to produce the generated file before signaling #types-stable"
  - file: "src/resolvers/userResolver.ts"
    howler: "howler-resolvers"
    action: "CREATES"
  - file: "src/resolvers/postResolver.ts"
    howler: "howler-resolvers"
    action: "CREATES"
  - file: "src/resolvers/commentResolver.ts"
    howler: "howler-resolvers"
    action: "CREATES"
  - file: "src/resolvers/searchResolver.ts"
    howler: "howler-resolvers"
    action: "CREATES"
  - file: "src/resolvers/index.ts"
    howler: "howler-resolvers"
    action: "MODIFIES"
    note: "merges all resolvers into root resolver map"
  - file: "src/subscriptions/notificationSubscription.ts"
    howler: "howler-subscriptions"
    action: "CREATES"
  - file: "src/hooks/useGraphQL.ts"
    howler: "howler-frontend-hooks"
    action: "CREATES"
  - file: "src/server.ts"
    howler: "howler-server"
    action: "CREATES"
    note: "Apollo server wiring — depends on all resolvers + subscriptions"
  - file: "src/apolloClient.ts"
    howler: "howler-frontend-hooks"
    action: "CREATES"

known_conflicts:
  - file: "src/generated/graphql.ts"
    naive_howlers: ["howler-resolvers", "howler-subscriptions", "howler-frontend-hooks"]
    correct_resolution: >
      src/generated/graphql.ts is generated by codegen, not hand-written. It must be
      owned by howler-schema, which runs `graphql-codegen` as part of its task.
      Other Howlers import from it but NEVER write to it.
      Naive approach: each resolver Howler generates its own types independently,
      producing 3 incompatible generated files with different field names.
  - file: "src/resolvers/index.ts"
    naive_howlers: ["howler-resolvers", "howler-subscriptions", "howler-server"]
    correct_resolution: >
      The resolver index is a merge point. It must be owned by howler-resolvers
      (since it owns all individual resolver files). howler-server imports from it
      but does not write to it.

expected_dag_edges:
  - from: "howler-resolvers"
    to: "howler-schema"
    type: "types"
    note: "Resolver types (QueryResolvers, MutationResolvers) come from src/generated/graphql.ts"
  - from: "howler-subscriptions"
    to: "howler-schema"
    type: "types"
  - from: "howler-frontend-hooks"
    to: "howler-schema"
    type: "types"
    note: "Apollo hooks are typed against generated types"
  - from: "howler-server"
    to: "howler-resolvers"
    type: "implementation"
    note: "Server wires the complete resolver map from howler-resolvers"
  - from: "howler-server"
    to: "howler-subscriptions"
    type: "implementation"

expected_contract_sections:
  - section: "shared_types"
    must_include:
      - "QueryResolvers"
      - "MutationResolvers"
      - "SubscriptionResolvers"
      - "UserType"
      - "PostType"
      - "CommentType"
  - section: "codegen_contract"
    must_include:
      - "graphql-codegen runs in howler-schema before #types-stable signal"
      - "src/generated/graphql.ts is read-only for all other Howlers"
  - section: "postconditions"
    howler: "howler-schema"
    must_include:
      - "graphql/schema.graphql is valid and passes graphql schema validation"
      - "src/generated/graphql.ts exists and exports QueryResolvers, MutationResolvers, SubscriptionResolvers"
  - section: "invariants"
    must_include:
      - "No Howler writes to src/generated/graphql.ts"
      - "All resolver types imported from src/generated/graphql.ts, not redefined"

scoring_notes: |
  Hard scenario. The discriminating insight: src/generated/graphql.ts is a *generated*
  file that functions as a shared type source. Gold must recognize that:
  1. The schema Howler must run codegen as part of its task (not just write the .graphql file)
  2. The generated file is a write-once artifact — all other Howlers are consumers
  3. The server Howler depends on howler-resolvers (implementation dep), not just types

  A weak Gold might:
  - Assign schema writing and codegen to separate Howlers (creating a generated file conflict)
  - Miss that howler-server has implementation deps (not just types deps) on resolvers + subscriptions
  - Fail to mark src/generated/graphql.ts as read-only in CONTRACT.md

  Effort: L (8-Howler complexity despite 6 Howlers because codegen step adds non-obvious work to howler-schema).
