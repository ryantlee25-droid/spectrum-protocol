known_conflicts:
  - file: "src/shared/types.ts"
    naive_howlers: ["howler-product", "howler-cart", "howler-checkout", "howler-payment", "howler-inventory"]
    correct_resolution: >
      Dedicated howler-shared-types owns src/shared/types.ts and src/shared/events.ts.
      All feature slices import Money, ProductId, etc. from @shared/types.
      Naive approach: each slice defines its own Money type with different precision handling,
      causing silent arithmetic bugs at slice boundaries.
  - file: "src/shared/events.ts"
    naive_howlers: ["howler-product", "howler-cart", "howler-checkout", "howler-notification", "howler-analytics"]
    correct_resolution: >
      EventBus and DomainEvent must be in shared/events.ts owned by howler-shared-types.
      Analytics Howler imports DomainEvent to define event consumers — it cannot define the
      base type itself without circular ownership.

