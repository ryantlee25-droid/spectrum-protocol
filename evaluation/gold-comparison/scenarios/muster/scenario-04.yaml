scenario_id: "muster-04"
gold_phase: "muster"
difficulty: "hard"
description: "8-Howler full muster: e-commerce platform migration with cross-cutting types, multiple shared interfaces, and a non-obvious DAG that has two serial phases"

task_description: |
  Migrate an e-commerce monolith to a feature-sliced architecture. The monolith
  has intermingled product, cart, checkout, payment, inventory, user, notification,
  and analytics concerns. Each domain becomes a self-contained feature slice with
  its own types, API layer, and UI components. Shared cross-cutting types (Money,
  ProductId, OrderId, UserId) must be extracted first.

  Additionally: the payment slice has a hard dependency on the checkout slice completing
  first (payment processes checkout state), and the analytics slice must come last
  (it instruments all other slices' event emissions).

plan_excerpt: |
  ## Task: E-Commerce Monolith Feature-Sliced Migration

  ### Phase 1 — Foundation (serial)
  - `src/shared/types.ts` — Money, ProductId, OrderId, UserId, CartId value objects
  - `src/shared/events.ts` — EventBus interface and DomainEvent base type

  ### Phase 2 — Core Slices (parallel after Phase 1)
  - `src/features/product/` — ProductRepository, ProductCard, ProductGrid
  - `src/features/cart/` — CartStore, CartItem, CartSummary component
  - `src/features/checkout/` — CheckoutFlow, OrderSummary, CheckoutState
  - `src/features/user/` — UserProfile, AuthGuard, UserStore
  - `src/features/inventory/` — InventoryService, StockBadge

  ### Phase 3 — Dependent Slices (serial dependencies)
  - `src/features/payment/` — PaymentForm, PaymentProcessor (depends on CheckoutState)
  - `src/features/notification/` — NotificationCenter, EmailTemplates

  ### Phase 4 — Instrumentation (serial, must be last)
  - `src/features/analytics/` — EventTracking wrappers for all slices

  ### Cross-cutting constraint
  Money type is used by product, cart, checkout, payment, and inventory slices.
  DomainEvent is used by all 7 non-analytics slices (analytics consumes them).

codebase_context:
  - path: "src/monolith/store.ts"
    content: |
      // 2400-line monolith — not shown in full
      interface Product { id: string; price: number; stock: number; }
      interface CartItem { productId: string; qty: number; price: number; }
      interface Order { id: string; items: CartItem[]; total: number; status: string; }
      interface User { id: string; email: string; roles: string[]; }
      // ... all domain logic intermingled ...
  - path: "src/shared/index.ts"
    content: |
      // Currently empty — shared types to be created
      export {};
  - path: "tsconfig.json"
    content: |
      {
        "compilerOptions": {
          "strict": true,
          "baseUrl": "src",
          "paths": { "@shared/*": ["shared/*"], "@features/*": ["features/*"] }
        }
      }

