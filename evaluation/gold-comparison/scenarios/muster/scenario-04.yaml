expected_contract_sections:
  - section: "shared_types"
    must_include:
      - "Money"
      - "ProductId"
      - "OrderId"
      - "UserId"
      - "CartId"
      - "DomainEvent"
      - "EventBus"
  - section: "postconditions"
    howler: "howler-shared-types"
    must_include:
      - "exports Money as branded type { amount: number; currency: string }"
      - "exports DomainEvent<T> with payload: T"
      - "signals #types-stable"
  - section: "postconditions"
    howler: "howler-checkout"
    must_include:
      - "exports CheckoutState interface"
      - "CheckoutState includes items, total: Money, status enum"
      - "signals #implementation-stable for payment dependency"
  - section: "serial_dependencies"
    must_include:
      - "howler-payment depends on howler-checkout#implementation-stable"
      - "howler-analytics depends on all 7 feature slices completing"
  - section: "invariants"
    must_include:
      - "Money arithmetic must preserve currency; no plain number arithmetic across slices"
      - "All DomainEvent emissions must use EventBus.emit(), not direct imports"

scoring_notes: |
  Hard scenario. Three layers of complexity:

  1. Cross-cutting types conflict (Money, DomainEvent) — visible to any careful reader
  2. Non-obvious serial dependency: payment depends on checkout's CheckoutState *interface*,
     not just the types foundation. This requires a #implementation-stable checkpoint,
     not just #types-stable.
  3. Analytics as a synthesizer: it imports event types from ALL 7 slices, so it must
     run last. A naive decomposition drops analytics in parallel and it fails to compile
     because slice event types don't exist yet.

  A Sonnet-level Gold might catch #1 but miss #2 (payment→checkout dep) and #3 (analytics
  as terminal synthesizer). An Opus-level Gold should catch all three.

  Effort: L. Expected Howler effort breakdown — shared-types: S, product/cart/user/inventory/notification: M, checkout: M, payment: M (serial dep), analytics: L (synthesizer).
