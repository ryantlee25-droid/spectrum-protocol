      - [x] Tests pass (6/6)
    debrief: |
      EventBus singleton implemented. DomainEvent, OrderCreated, OrderCancelled exported.
      subscribe() returns unsubscribe function. Wildcard support via empty-string type.
    files_created:
      - path: "src/shared/eventbus.ts"
        content: |
          export interface DomainEvent {
            type: string;
            payload: unknown;
            timestamp: number;
            correlationId: string;
          }
          export interface OrderCreated extends DomainEvent {
            type: 'order.created';
            payload: { orderId: string; items: any[]; total: { amount: number; currency: string } };
          }
          export interface OrderCancelled extends DomainEvent {
            type: 'order.cancelled';
            payload: { orderId: string; reason: string };
          }
          export interface EventBus {
            emit<T extends DomainEvent>(event: T): void;
            subscribe<T extends DomainEvent>(eventType: string, handler: (event: T) => void): () => void;
          }
          class EventBusImpl implements EventBus {
            private handlers: Map<string, Set<Function>> = new Map();
            emit<T extends DomainEvent>(event: T): void {
              const handlers = this.handlers.get(event.type) ?? new Set();
              const wildcards = this.handlers.get('*') ?? new Set();
              [...handlers, ...wildcards].forEach(h => h(event));
            }
            subscribe<T extends DomainEvent>(eventType: string, handler: (event: T) => void): () => void {
              if (!this.handlers.has(eventType)) this.handlers.set(eventType, new Set());
              this.handlers.get(eventType)!.add(handler);
              return () => this.handlers.get(eventType)?.delete(handler);
            }
          }
          export const bus = new EventBusImpl();

