scenario_id: "pax-03"
gold_phase: "pax"
difficulty: "medium"
description: "5-Howler Pax: seam mismatch between two Howlers — one declares a seam that the other's implementation doesn't satisfy"

contract_md: |
  ## Integration Points

  ### EventBus
  All domain events flow through a shared EventBus singleton.
  ```typescript
  interface EventBus {
    emit<T extends DomainEvent>(event: T): void;
    subscribe<T extends DomainEvent>(
      eventType: string,
      handler: (event: T) => void
    ): () => void; // returns unsubscribe fn
  }
  interface DomainEvent {
    type: string;
    payload: unknown;
    timestamp: number;
    correlationId: string;
  }
  ```

  ### Event Contracts
  - howler-order emits: OrderCreated, OrderCancelled
  - howler-inventory listens to: OrderCreated (to decrement stock), OrderCancelled (to restore stock)
  - howler-notification listens to: OrderCreated (send confirmation email), OrderCancelled (send cancellation email)
  - howler-analytics listens to: ALL domain events (write to analytics store)

  ## Postconditions

  ### howler-eventbus
  - exports EventBus interface and singleton instance `bus`
  - exports DomainEvent interface
  - exports OrderCreated: { type: 'order.created'; payload: { orderId: string; items: OrderItem[]; total: Money } }
  - exports OrderCancelled: { type: 'order.cancelled'; payload: { orderId: string; reason: string } }

  ### howler-order
  - emits OrderCreated via `bus.emit()` when order is confirmed
  - emits OrderCancelled via `bus.emit()` when order is cancelled
  - imports bus from '@shared/eventbus'

  ### howler-inventory
  - subscribes to 'order.created' and 'order.cancelled' via `bus.subscribe()`
  - decrements stock on OrderCreated, restores on OrderCancelled
  - handler unsubscribed on module teardown

  ### howler-notification
  - subscribes to 'order.created' and 'order.cancelled' via `bus.subscribe()`
  - sends email via NotificationService on each event

  ### howler-analytics
  - subscribes to ALL events by passing wildcard handler
  - stores each DomainEvent to analytics store with timestamp

debrief_set:
