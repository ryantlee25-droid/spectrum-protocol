    debrief: |
      Analytics collector subscribes via wildcard. Writes all events to analytics store.
      Note: observed potential issue in inventory but it was outside my scope.
    files_created:
      - path: "src/features/analytics/AnalyticsCollector.ts"
        content: |
          import { bus, DomainEvent } from '@shared/eventbus';
          const analyticsStore: DomainEvent[] = [];
          export function initAnalytics(): () => void {
            const unsub = bus.subscribe<DomainEvent>('*', (event) => {
              analyticsStore.push(event);
            });
            return unsub;
          }
          export function getAnalyticsStore(): readonly DomainEvent[] {
            return analyticsStore;
          }

injected_deviations:
  - howler: "howler-inventory"
    deviation_type: "postcondition_violation"
    description: >
      CONTRACT.md postcondition: 'restores stock on OrderCancelled'. The implementation's
      OrderCancelled handler only logs the cancellation (console.log) and does NOT
      restore stock levels. Stock will permanently decrease on cancellations, causing
      phantom stock-outs.
    severity: "blocker"
    location: "src/features/inventory/InventoryService.ts lines 12-15"
    detection_method: >
      Gold must read InventoryService.ts and check the OrderCancelled handler body.
      The howler-analytics cross-domain observation in its HOOK.md actually flags this
      ('saw console.log where stock update should be') — Gold should notice this
      cross-domain signal even if it misses the direct file inspection.

correct_howlers:
  - "howler-eventbus"
  - "howler-order"
  - "howler-notification"
  - "howler-analytics"

scoring_notes: |
  Medium difficulty. Two detection paths:
  1. Direct: Gold reads InventoryService.ts and sees console.log instead of stock restore
  2. Indirect: Gold reads howler-analytics HOOK.md cross-domain section which explicitly
     flags the suspect behavior

  Testing Gold's cross-domain observation synthesis: the protocol requires Gold to
  read each Howler's HOOK.md cross-domain section. If Gold does this correctly, it
  sees the analytics Howler's warning even before reading inventory files.

  Difficulty calibration: medium because there's a cross-domain hint available.
  A hard variant would have no hints and bury the bug deeper in a 200-line file.
