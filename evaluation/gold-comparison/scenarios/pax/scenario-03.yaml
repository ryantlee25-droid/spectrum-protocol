          import { bus, OrderCreated, OrderCancelled } from '@shared/eventbus';
          export async function confirmOrder(orderId: string, items: any[], total: any): Promise<void> {
            const event: OrderCreated = {
              type: 'order.created',
              payload: { orderId, items, total },
              timestamp: Date.now(),
              correlationId: crypto.randomUUID(),
            };
            bus.emit(event);
          }
          export async function cancelOrder(orderId: string, reason: string): Promise<void> {
            const event: OrderCancelled = {
              type: 'order.cancelled',
              payload: { orderId, reason },
              timestamp: Date.now(),
              correlationId: crypto.randomUUID(),
            };
            bus.emit(event);
          }

  - howler: "howler-inventory"
