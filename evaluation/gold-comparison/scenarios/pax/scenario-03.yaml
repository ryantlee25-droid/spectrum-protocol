      - seam with howler-eventbus: listens to OrderCreated, OrderCancelled events
    debrief: |
      Subscribes to order events. Decrements and restores stock as required.
    files_created:
      - path: "src/features/inventory/InventoryService.ts"
        content: |
          import { bus, OrderCreated, OrderCancelled } from '@shared/eventbus';
          const stockLevels = new Map<string, number>();
          export function initInventoryListeners(): () => void {
            const unsub1 = bus.subscribe<OrderCreated>('order.created', (event) => {
              for (const item of event.payload.items) {
                const current = stockLevels.get(item.productId) ?? 0;
                stockLevels.set(item.productId, current - item.qty);
              }
            });
            const unsub2 = bus.subscribe<OrderCancelled>('order.cancelled', (event) => {
              // BUG: does not restore stock — just logs the cancellation
              console.log(`Order ${event.payload.orderId} cancelled: ${event.payload.reason}`);
            });
            return () => { unsub1(); unsub2(); };
          }

