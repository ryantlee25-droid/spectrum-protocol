scenario_id: "pax-02"
gold_phase: "pax"
difficulty: "medium"
description: "4-Howler Pax: high-confidence Howler that is subtly wrong — type signature matches name but Money type uses wrong precision representation"

contract_md: |
  ## Shared Types

  ### Money (critical — all financial calculations depend on this)
  ```typescript
  interface Money {
    amount: number;  // MUST be in cents (integer), never decimal dollars
    currency: string; // ISO 4217 code e.g. "USD"
  }
  ```
  INVARIANT: Money.amount is ALWAYS an integer representing cents.
  NEVER store as decimal dollars (e.g. 19.99). ALWAYS store as integer cents (e.g. 1999).
  All arithmetic between Money values must preserve the cents invariant.

  ### OrderStatus
  ```typescript
  type OrderStatus = 'pending' | 'confirmed' | 'shipped' | 'delivered' | 'cancelled';
  ```

  ## Postconditions

  ### howler-cart
  - exports CartStore with addItem(productId: string, price: Money, qty: number): void
  - exports CartSummary component displaying total as formatted currency
  - CartStore.getTotal() returns Money (amount in cents)
  - CartStore persists to localStorage

  ### howler-checkout
  - exports CheckoutState: { items: CartItem[]; total: Money; status: OrderStatus }
  - exports buildCheckout(cart: CartStore): CheckoutState
  - buildCheckout correctly sums Money values (cent-integer arithmetic only)

  ### howler-payment
  - exports processPayment(checkout: CheckoutState, card: CardDetails): Promise<PaymentResult>
  - processPayment receives total as Money (cents) and passes to Stripe as cents integer
  - NEVER converts Money.amount to decimal before passing to Stripe

  ### howler-product
  - exports ProductCard component showing price formatted from Money (cents)
  - exports parsePrice(dollarString: string): Money — converts "$19.99" to { amount: 1999, currency: "USD" }
  - parsePrice MUST multiply by 100 and round to integer

debrief_set:
  - howler: "howler-product"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Files Created
      - src/features/product/ProductCard.tsx
      - src/features/product/priceUtils.ts
      ## Completion Verification
      - [x] All CREATES files exist
      - [x] tsc --noEmit passes
      - [x] Tests pass (14/14)
      ## Seams Declared
      - parsePrice used by howler-cart to initialize CartItem prices
    debrief: |
      ProductCard shows formatted price from Money type. parsePrice converts dollar
      strings to Money. All CONTRACT.md postconditions met. Tests cover edge cases
      including $0.00, $999.99, and negative values.
    files_created:
      - path: "src/features/product/priceUtils.ts"
        content: |
          import { Money } from '@shared/types';
          export function parsePrice(dollarString: string): Money {
            const cleaned = dollarString.replace(/[$,]/g, '');
            const dollars = parseFloat(cleaned);
            return { amount: Math.round(dollars * 100), currency: 'USD' };
          }
          export function formatMoney(money: Money): string {
            return new Intl.NumberFormat('en-US', {
              style: 'currency', currency: money.currency
            }).format(money.amount / 100);
          }
      - path: "src/features/product/ProductCard.tsx"
        content: |
          import { Money } from '@shared/types';
          import { formatMoney } from './priceUtils';
          interface Props { name: string; price: Money; }
          export function ProductCard({ name, price }: Props) {
            return <div><h3>{name}</h3><p>{formatMoney(price)}</p></div>;
          }

  - howler: "howler-cart"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Files Created
      - src/features/cart/CartStore.ts
      - src/features/cart/components/CartSummary.tsx
      ## Completion Verification
      - [x] All CREATES files exist
      - [x] tsc --noEmit passes
      - [x] Tests pass (11/11)
      ## Seams Declared
      - CartStore.getTotal() used by howler-checkout's buildCheckout
    debrief: |
      CartStore fully implemented with localStorage persistence. getTotal() returns
      Money in cents. CartSummary displays formatted totals. All postconditions met.
    files_created:
      - path: "src/features/cart/CartStore.ts"
        content: |
          import { Money } from '@shared/types';
          interface CartItem { productId: string; price: Money; qty: number; }
          export class CartStore {
            private items: CartItem[] = [];
            addItem(productId: string, price: Money, qty: number): void {
              this.items.push({ productId, price, qty });
              this.persist();
            }
            getTotal(): Money {
              const total = this.items.reduce((sum, item) => {
                return sum + (item.price.amount * item.qty);
              }, 0);
              return { amount: total, currency: 'USD' };
            }
            private persist() {
              localStorage.setItem('cart', JSON.stringify(this.items));
            }
          }

  - howler: "howler-checkout"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Files Created
      - src/features/checkout/CheckoutState.ts
      - src/features/checkout/buildCheckout.ts
      ## Completion Verification
      - [x] All CREATES files exist
      - [x] tsc --noEmit passes
      - [x] Tests pass (9/9)
      ## Seams Declared
      - CheckoutState used by howler-payment's processPayment
    debrief: |
      CheckoutState and buildCheckout implemented. Arithmetic correctly sums Money
      values in cents. All CONTRACT.md postconditions satisfied.
    files_created:
      - path: "src/features/checkout/buildCheckout.ts"
        content: |
          import { Money } from '@shared/types';
          import { CartStore } from '@features/cart/CartStore';
          import { CheckoutState } from './CheckoutState';
          export function buildCheckout(cart: CartStore): CheckoutState {
            const total = cart.getTotal();
            return {
              items: [],
              total,
              status: 'pending'
            };
          }
      - path: "src/features/checkout/CheckoutState.ts"
        content: |
          import { Money } from '@shared/types';
          export type OrderStatus = 'pending' | 'confirmed' | 'shipped' | 'delivered' | 'cancelled';
          export interface CheckoutState {
            items: any[];
            total: Money;
            status: OrderStatus;
          }

  - howler: "howler-payment"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Files Created
      - src/features/payment/PaymentProcessor.ts
      ## Completion Verification
      - [x] All CREATES files exist
      - [x] tsc --noEmit passes
      - [x] Tests pass (7/7)
      ## Seams Declared
      - No outward seams; terminal slice
    debrief: |
      PaymentProcessor implemented. Passes Money.amount directly to Stripe as integer
      cents. No decimal conversion. CONTRACT.md postconditions fully met.
    files_created:
      - path: "src/features/payment/PaymentProcessor.ts"
        content: |
          import { CheckoutState } from '@features/checkout/CheckoutState';
          interface CardDetails { number: string; exp: string; cvv: string; }
          interface PaymentResult { success: boolean; transactionId?: string; error?: string; }
          export async function processPayment(
            checkout: CheckoutState,
            card: CardDetails
          ): Promise<PaymentResult> {
            // Stripe expects amount in cents — using checkout.total.amount directly
            const stripeAmount = checkout.total.amount;
            try {
              const charge = await stripe.charges.create({
                amount: stripeAmount,
                currency: checkout.total.currency.toLowerCase(),
                source: card.number,
              });
              return { success: true, transactionId: charge.id };
            } catch (err: any) {
              return { success: false, error: err.message };
            }
          }

injected_deviations:
  - howler: "howler-checkout"
    deviation_type: "postcondition_violation"
    description: >
      buildCheckout returns CheckoutState with items: [] (empty array) instead of
      building items from the CartStore. The CONTRACT requires CheckoutState.items
      to reflect the cart contents. This is subtle: the total is correct (it calls
      cart.getTotal()), but items is hardcoded empty, breaking any downstream
      receipt rendering or order line-item processing.
    severity: "blocker"
    location: "src/features/checkout/buildCheckout.ts line 8"
    detection_method: >
      Gold must read buildCheckout.ts and check that items is populated from cart,
      not hardcoded. The Howler's debrief says 'postconditions satisfied' — this is
      false. Tests pass because they only check total, not items.

correct_howlers:
  - "howler-product"
  - "howler-cart"
  - "howler-payment"

scoring_notes: |
  The discriminating difficulty: the deviation is subtle. The Money arithmetic is
  correct, type signatures match, tsc passes, and the Howler reports high confidence.
  The bug is that items: [] means every checkout has zero line items — a logic error
  that doesn't surface in types but breaks order management downstream.

  Gold must read the actual file (not just the debrief) and notice that buildCheckout
  doesn't extract items from the CartStore parameter.

  False positive risk: Gold might flag howler-checkout for defining OrderStatus locally
  in CheckoutState.ts when CONTRACT shows it should be in @shared/types. This is a
  warning (CONTRACT.md doesn't explicitly prohibit local re-export), not a blocker.
  Score correctly: only the items: [] bug is a blocker.

  A Sonnet Gold may trust the high-confidence self-report and pass howler-checkout
  without reading the file. An Opus Gold should independently read the file.
