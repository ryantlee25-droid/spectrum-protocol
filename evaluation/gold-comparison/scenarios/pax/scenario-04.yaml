scenario_id: "pax-04"
gold_phase: "pax"
difficulty: "hard"
description: "6-Howler Pax: multiple deviations at different severities; one correct Howler gets flagged by a naive Gold (false positive trap); seam declaration mismatch"

contract_md: |
  ## Shared Types

  ### AuthToken
  ```typescript
  interface AuthToken {
    accessToken: string;
    refreshToken: string;
    expiresIn: number;  // seconds
    tokenType: 'Bearer';
  }
  ```

  ### Permission system
  ```typescript
  type Permission = 'read:users' | 'write:users' | 'read:reports' | 'write:reports' | 'admin:all';
  interface PermissionSet {
    userId: string;
    permissions: Permission[];
    grantedAt: number; // epoch ms
  }
  ```

  ## Postconditions

  ### howler-auth-service
  - exports `login(email, password): Promise<AuthToken>`
  - exports `refresh(refreshToken: string): Promise<AuthToken>`
  - exports `logout(accessToken: string): Promise<void>`
  - JWT expiry: accessToken = 15 min (900s), refreshToken = 7 days (604800s)
  - INVARIANT: expiresIn field ALWAYS reflects accessToken TTL (900), not refresh TTL

  ### howler-permissions
  - exports `grantPermissions(userId, permissions: Permission[]): Promise<PermissionSet>`
  - exports `checkPermission(userId, permission: Permission): Promise<boolean>`
  - exports `revokePermission(userId, permission: Permission): Promise<void>`
  - INVARIANT: checkPermission returns false (not throws) for unknown userIds

  ### howler-user-api
  - GET /users/:id — returns user record; requires 'read:users' permission
  - POST /users — creates user; requires 'write:users' permission
  - Permission check via checkPermission() from howler-permissions
  - Returns 403 (not 401) on permission denied

  ### howler-reports-api
  - GET /reports/:id — requires 'read:reports' permission
  - POST /reports — requires 'write:reports' permission
  - Admin users (permission 'admin:all') bypass all report permission checks
  - Returns 403 on permission denied

  ### howler-middleware
  - exports `requireAuth` middleware — validates Bearer token, attaches userId to req
  - exports `requirePermission(permission: Permission)` middleware factory
  - 401 for missing/invalid token, 403 for valid token but insufficient permission
  - INVARIANT: requireAuth sets req.userId, not req.user (object would include PII)

  ### howler-admin-ui
  - PermissionMatrix component — shows grid of users × permissions, allows toggle
  - Calls grantPermissions/revokePermission from API layer
  - Displays permission grantedAt as human-readable date

debrief_set:
  - howler: "howler-auth-service"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - howler-middleware imports AuthToken type from auth-service
      - expiresIn is set to 900 (15 min) in accessToken
    debrief: |
      login, refresh, logout all implemented. expiresIn correctly set to 900.
    files_created:
      - path: "src/auth/AuthService.ts"
        content: |
          import jwt from 'jsonwebtoken';
          export interface AuthToken {
            accessToken: string;
            refreshToken: string;
            expiresIn: number;
            tokenType: 'Bearer';
          }
          export async function login(email: string, password: string): Promise<AuthToken> {
            // validate credentials ...
            const accessToken = jwt.sign({ sub: userId }, SECRET, { expiresIn: '15m' });
            const refreshToken = jwt.sign({ sub: userId, type: 'refresh' }, REFRESH_SECRET, { expiresIn: '7d' });
            return { accessToken, refreshToken, expiresIn: 900, tokenType: 'Bearer' };
          }
          export async function refresh(refreshToken: string): Promise<AuthToken> {
            // validate refresh token ...
            const accessToken = jwt.sign({ sub: userId }, SECRET, { expiresIn: '15m' });
            const newRefresh = jwt.sign({ sub: userId, type: 'refresh' }, REFRESH_SECRET, { expiresIn: '7d' });
            return { accessToken, refreshToken: newRefresh, expiresIn: 604800, tokenType: 'Bearer' };
          }
          export async function logout(accessToken: string): Promise<void> {
            // blacklist token ...
          }

  - howler: "howler-permissions"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - checkPermission imported by howler-user-api and howler-reports-api
    debrief: |
      grantPermissions, checkPermission, revokePermission all implemented.
      Returns false for unknown users (no throw). Fully CONTRACT-compliant.
    files_created:
      - path: "src/auth/PermissionService.ts"
        content: |
          export type Permission = 'read:users' | 'write:users' | 'read:reports' | 'write:reports' | 'admin:all';
          export interface PermissionSet {
            userId: string;
            permissions: Permission[];
            grantedAt: number;
          }
          const permissionStore = new Map<string, PermissionSet>();
          export async function grantPermissions(userId: string, permissions: Permission[]): Promise<PermissionSet> {
            const ps: PermissionSet = { userId, permissions, grantedAt: Date.now() };
            permissionStore.set(userId, ps);
            return ps;
          }
          export async function checkPermission(userId: string, permission: Permission): Promise<boolean> {
            const ps = permissionStore.get(userId);
            if (!ps) return false;
            return ps.permissions.includes(permission) || ps.permissions.includes('admin:all');
          }
          export async function revokePermission(userId: string, permission: Permission): Promise<void> {
            const ps = permissionStore.get(userId);
            if (!ps) return;
            ps.permissions = ps.permissions.filter(p => p !== permission);
          }

  - howler: "howler-user-api"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - GET /users/:id, POST /users implemented
      - Uses checkPermission from PermissionService
      - Returns 403 on permission denied
    debrief: |
      User API endpoints implemented. Permission checks in place. 403 on denial.
    files_created:
      - path: "src/api/userRoutes.ts"
        content: |
          import { Router } from 'express';
          import { checkPermission } from '../auth/PermissionService';
          const router = Router();
          router.get('/:id', async (req, res) => {
            const allowed = await checkPermission(req.userId, 'read:users');
            if (!allowed) return res.status(403).json({ error: 'Forbidden' });
            // fetch user ...
            res.json({ id: req.params.id });
          });
          router.post('/', async (req, res) => {
            const allowed = await checkPermission(req.userId, 'write:users');
            if (!allowed) return res.status(403).json({ error: 'Forbidden' });
            // create user ...
            res.status(201).json({ id: 'new-user-id' });
          });
          export default router;

  - howler: "howler-reports-api"
    status: "complete"
    confidence: "medium"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - admin:all permission bypasses report checks
      - Returns 403 on denial
    debrief: |
      Reports API with admin bypass implemented. All postconditions met.
    files_created:
      - path: "src/api/reportRoutes.ts"
        content: |
          import { Router } from 'express';
          import { checkPermission } from '../auth/PermissionService';
          const router = Router();
          router.get('/:id', async (req, res) => {
            const isAdmin = await checkPermission(req.userId, 'admin:all');
            const canRead = isAdmin || await checkPermission(req.userId, 'read:reports');
            if (!canRead) return res.status(403).json({ error: 'Forbidden' });
            res.json({ id: req.params.id });
          });
          router.post('/', async (req, res) => {
            const isAdmin = await checkPermission(req.userId, 'admin:all');
            // BUG: checks write:users instead of write:reports
            const canWrite = isAdmin || await checkPermission(req.userId, 'write:users');
            if (!canWrite) return res.status(403).json({ error: 'Forbidden' });
            res.status(201).json({ id: 'new-report-id' });
          });
          export default router;

  - howler: "howler-middleware"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - requireAuth sets req.userId (string, not req.user object)
      - requirePermission factory exported
    debrief: |
      requireAuth and requirePermission implemented per CONTRACT. req.userId set correctly.
    files_created:
      - path: "src/middleware/auth.ts"
        content: |
          import jwt from 'jsonwebtoken';
          import { Permission } from '../auth/PermissionService';
          import { checkPermission } from '../auth/PermissionService';
          export function requireAuth(req: any, res: any, next: any): void {
            const auth = req.headers.authorization;
            if (!auth?.startsWith('Bearer ')) return res.status(401).json({ error: 'Unauthorized' });
            try {
              const payload = jwt.verify(auth.slice(7), SECRET) as { sub: string };
              req.userId = payload.sub; // sets userId string, not user object
              next();
            } catch {
              res.status(401).json({ error: 'Invalid token' });
            }
          }
          export function requirePermission(permission: Permission) {
            return async (req: any, res: any, next: any) => {
              const allowed = await checkPermission(req.userId, permission);
              if (!allowed) return res.status(403).json({ error: 'Forbidden' });
              next();
            };
          }

  - howler: "howler-admin-ui"
    status: "complete"
    confidence: "medium"
    hook_md: |
      ## Status: complete
      ## Seams Declared
      - PermissionMatrix uses grantPermissions/revokePermission via API calls
    debrief: |
      PermissionMatrix shows users × permissions grid. Toggle works. grantedAt formatted.
    files_created:
      - path: "src/admin/PermissionMatrix.tsx"
        content: |
          import { PermissionSet, Permission } from '../auth/PermissionService';
          const ALL_PERMISSIONS: Permission[] = ['read:users', 'write:users', 'read:reports', 'write:reports', 'admin:all'];
          export function PermissionMatrix({ permissionSets }: { permissionSets: PermissionSet[] }) {
            const handleToggle = async (userId: string, permission: Permission, hasIt: boolean) => {
              if (hasIt) {
                await fetch('/api/permissions/revoke', { method: 'POST', body: JSON.stringify({ userId, permission }) });
              } else {
                await fetch('/api/permissions/grant', { method: 'POST', body: JSON.stringify({ userId, permissions: [permission] }) });
              }
            };
            return (
              <table>
                <thead>
                  <tr><th>User</th>{ALL_PERMISSIONS.map(p => <th key={p}>{p}</th>)}</tr>
                </thead>
                <tbody>
                  {permissionSets.map(ps => (
                    <tr key={ps.userId}>
                      <td>{ps.userId}</td>
                      {ALL_PERMISSIONS.map(p => (
                        <td key={p}>
                          <input
                            type="checkbox"
                            checked={ps.permissions.includes(p)}
                            onChange={() => handleToggle(ps.userId, p, ps.permissions.includes(p))}
                          />
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            );
          }

injected_deviations:
  - howler: "howler-auth-service"
    deviation_type: "postcondition_violation"
    description: >
      The refresh() function returns expiresIn: 604800 (7 days in seconds — the refresh
      token TTL) instead of 900 (15 min — the access token TTL). CONTRACT invariant:
      expiresIn ALWAYS reflects accessToken TTL (900). Clients using expiresIn to
      schedule token refresh will wait 7 days before refreshing, causing sessions to
      appear expired to the server after 15 minutes while the client thinks they're
      still valid for 7 days.
    severity: "blocker"
    location: "src/auth/AuthService.ts in refresh() function, line returning expiresIn: 604800"
    detection_method: >
      Gold must read AuthService.ts and check that both login() and refresh() return
      expiresIn: 900. The login() is correct; only refresh() is wrong. The debrief
      mentions 'expiresIn correctly set to 900' — true for login, false for refresh.

  - howler: "howler-reports-api"
    deviation_type: "postcondition_violation"
    description: >
      POST /reports checks 'write:users' permission instead of 'write:reports'.
      Users with write:users but not write:reports can create reports. Users with
      write:reports but not write:users cannot. This is a wrong-constant bug, not
      a missing check.
    severity: "blocker"
    location: "src/api/reportRoutes.ts POST handler, checkPermission call with 'write:users'"
    detection_method: >
      Gold must read reportRoutes.ts and check each permission string against the
      CONTRACT. The GET handler is correct; only the POST is wrong.

correct_howlers:
  - "howler-permissions"
  - "howler-user-api"
  - "howler-middleware"
  - "howler-admin-ui"

false_positive_traps:
  - howler: "howler-admin-ui"
    trap_description: >
      PermissionMatrix imports directly from '../auth/PermissionService' instead of
      through an API layer. A superficial Gold might flag this as an architectural
      violation (UI importing from service layer). However, CONTRACT.md does not
      prohibit direct imports — it only requires using grantPermissions/revokePermission
      which the component does (via API calls, actually). The import is for TypeScript
      type references only (PermissionSet, Permission) — the actual data mutations
      go through fetch calls. This is NOT a deviation.
  - howler: "howler-middleware"
    trap_description: >
      requirePermission calls checkPermission which was implemented by howler-permissions.
      A Gold checking seam consistency might note that the seam isn't cross-referenced
      in howler-permissions' debrief. However, howler-middleware is a consumer of
      checkPermission, not a co-owner — one-directional seam declarations are valid.

scoring_notes: |
  Hard scenario. Three layers:

  1. Two real deviations to catch (expiresIn in refresh, wrong permission constant)
  2. Two false positive traps (admin-ui type imports, middleware seam direction)
  3. The expiresIn bug is easy to miss because login() is correct — Gold must check
     BOTH functions in auth-service, not just confirm the file exists

  Scoring:
  - Full credit: catches both deviations, flags neither false positive
  - Partial credit: catches one deviation
  - Penalty: flags either false positive as a blocker (false positive rate metric)

  This is the strongest Pax discriminator: Opus Gold should read every function in
  auth-service and notice that refresh() deviates from login(). Sonnet Gold may read
  the top of the file, see expiresIn: 900 in login(), and stop there.
