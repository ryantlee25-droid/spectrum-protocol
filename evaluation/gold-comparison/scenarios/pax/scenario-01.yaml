scenario_id: "pax-01"
gold_phase: "pax"
difficulty: "easy"
description: "3-Howler Pax: one overt postcondition violation — Howler claims to export a function but uses a different name"

contract_md: |
  ## Shared Types
  - UserSession: { userId: string; roles: string[]; expiresAt: number }
  - ApiResponse<T>: { data: T; error: string | null; meta: { requestId: string } }

  ## Postconditions

  ### howler-auth
  - exports `authMiddleware(req, res, next): void`
  - exports `UserSession` type
  - exports `createSession(userId: string, roles: string[]): UserSession`
  - exports `destroySession(sessionId: string): Promise<void>`

  ### howler-api
  - exports `validateRequest(schema: ZodSchema, data: unknown): ApiResponse<unknown>`
  - exports `ApiResponse<T>` type
  - all route handlers return `ApiResponse<T>`

  ### howler-ui
  - exports `LoginForm` React component
  - LoginForm emits `onSuccess(session: UserSession)` callback
  - LoginForm imports UserSession from `../../auth` (not redefined locally)

debrief_set:
  - howler: "howler-auth"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Files Created
      - src/auth/middleware.ts
      - src/auth/session.ts
      - src/auth/index.ts
      ## Completion Verification
      - [x] All CREATES files exist
      - [x] tsc --noEmit passes
      - [x] Tests pass (12/12)
      ## Seams Declared
      - howler-ui imports UserSession from src/auth/index.ts
      - howler-api imports ApiResponse contract (not from us)
    debrief: |
      Implemented authMiddleware, createSession, destroySession, and UserSession type.
      All exports match CONTRACT.md. Redis-backed session store with 24h TTL.
    files_created:
      - path: "src/auth/index.ts"
        content: |
          export interface UserSession {
            userId: string;
            roles: string[];
            expiresAt: number;
          }
          export function authMiddleware(req: any, res: any, next: any): void {
            const token = req.headers.authorization?.split(' ')[1];
            if (!token) return res.status(401).json({ error: 'Unauthorized' });
            next();
          }
          export function createSession(userId: string, roles: string[]): UserSession {
            return { userId, roles, expiresAt: Date.now() + 86400000 };
          }
          export async function destroySession(sessionId: string): Promise<void> {
            await redisClient.del(`session:${sessionId}`);
          }

  - howler: "howler-api"
    status: "complete"
    confidence: "high"
    hook_md: |
      ## Status: complete
      ## Files Created
      - src/api/validator.ts
      - src/api/index.ts
      ## Completion Verification
      - [x] All CREATES files exist
      - [x] tsc --noEmit passes
      - [x] Tests pass (8/8)
      ## Seams Declared
      - howler-ui uses ApiResponse from src/api/index.ts
    debrief: |
      Implemented request validation with Zod. All route handlers return ApiResponse<T>.
      validateRequest exported and working.
    files_created:
      - path: "src/api/index.ts"
        content: |
          import { z } from 'zod';
          export interface ApiResponse<T> {
            data: T;
            error: string | null;
            meta: { requestId: string };
          }
          // Note: function is named validateReq, not validateRequest
          export function validateReq<T>(schema: z.ZodSchema<T>, data: unknown): ApiResponse<T> {
            const result = schema.safeParse(data);
            if (!result.success) {
              return { data: null as any, error: result.error.message, meta: { requestId: crypto.randomUUID() } };
            }
            return { data: result.data, error: null, meta: { requestId: crypto.randomUUID() } };
          }

  - howler: "howler-ui"
    status: "complete"
    confidence: "medium"
    hook_md: |
      ## Status: complete
      ## Files Created
      - src/components/LoginForm.tsx
      ## Completion Verification
      - [x] All CREATES files exist
      - [x] tsc --noEmit passes
      - [x] Tests pass (5/5)
      ## Seams Declared
      - Imports UserSession from src/auth/index.ts (as contracted)
    debrief: |
      LoginForm implemented with onSuccess callback. Imports UserSession from auth module.
    files_created:
      - path: "src/components/LoginForm.tsx"
        content: |
          import { UserSession } from '../../auth';
          interface Props {
            onSuccess: (session: UserSession) => void;
          }
          export function LoginForm({ onSuccess }: Props) {
            const handleSubmit = async (e: React.FormEvent) => {
              e.preventDefault();
              // calls /api/login, receives session
              const session: UserSession = await fetch('/api/login').then(r => r.json());
              onSuccess(session);
            };
            return <form onSubmit={handleSubmit}><button type="submit">Login</button></form>;
          }

injected_deviations:
  - howler: "howler-api"
    deviation_type: "postcondition_violation"
    description: >
      CONTRACT.md postcondition requires export named 'validateRequest' but the function
      is named 'validateReq'. Any caller using validateRequest will get a compile error.
    severity: "blocker"
    location: "src/api/index.ts line 8"
    detection_method: >
      Gold must read src/api/index.ts and diff the exported function name against
      the CONTRACT.md postcondition. The debrief says 'validateRequest exported and working'
      which is false — this is a high-confidence Howler lying by omission.

correct_howlers:
  - "howler-auth"
  - "howler-ui"

scoring_notes: |
  Easy Pax scenario. The deviation is findable by direct file inspection:
  - CONTRACT says: exports validateRequest
  - File exports: validateReq
  The debrief claims success with high confidence. Gold must not trust the self-report
  and must read the actual file.

  A correct Pax output: flags howler-api as blocker (name mismatch), marks howler-auth
  and howler-ui as clean.

  False positive risk: Gold might also flag LoginForm for importing from '../../auth'
  (a relative path) vs a path alias. This is NOT a deviation — the CONTRACT doesn't
  mandate path alias usage for UI components.
