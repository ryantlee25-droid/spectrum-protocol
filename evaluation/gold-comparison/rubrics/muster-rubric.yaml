---
# Muster Phase Scoring Rubric
# Phase weight in composite score: 40%
# All item weights within this rubric sum to 1.0
# scoring_method: "automated" | "human" | "hybrid"

phase: muster
phase_weight: 0.40
version: "1.0"
description: >
  Rubric for evaluating Gold agent output quality during the Muster phase.
  Muster encompasses task decomposition, file ownership matrix construction,
  DAG assembly, CONTRACT.md authoring, and Politico integration.
  Each scenario YAML provides ground-truth fields against which automated
  items are computed; human items use the criteria defined below.

items:
  - id: "muster_file_ownership_completeness"
    name: "File Ownership Completeness"
    weight: 0.18
    scoring_method: "automated"
    computation: |
      # found_files = set of files that appear in Gold's MANIFEST.md ownership matrix
      # expected_files = set of files from scenario.expected_file_ownership (all files
      #   mentioned in the task description that must be explicitly owned)
      score = len(found_files & expected_files) / len(expected_files)
      # Denominator is always > 0 (scenarios guarantee at least one expected file)
    score_range: [0.0, 1.0]
    threshold_pass: 0.95
    description: >
      Every file mentioned in the task description (task_description + plan_excerpt)
      that requires explicit ownership must appear in the file ownership matrix.
      A file is "found" if it appears in Gold's MANIFEST.md ownership matrix with
      a Howler name and an action (CREATES or MODIFIES). Files not mentioned in the
      scenario's expected_file_ownership list are not counted (avoids penalizing Gold
      for discovering additional files). Score of 1.0 means 100% of expected files
      are claimed. Score below 0.95 fails this item.

  - id: "muster_file_ownership_conflict_detection"
    name: "File Ownership Conflict Detection"
    weight: 0.15
    scoring_method: "automated"
    computation: |
      # Each muster scenario injects N conflicts (files claimed by 2+ Howlers) via
      # scenario.known_conflicts (list of {file, howlers: [A, B]}).
      # conflicts_found = number of injected conflicts Gold explicitly flags as conflicts
      #   in its MANIFEST.md or output prose (file appears as CONFLICT or Gold adds a note).
      # conflicts_injected = len(scenario.known_conflicts)
      score = conflicts_found / conflicts_injected
      # If conflicts_injected == 0, this item scores 1.0 automatically (no conflicts to find).
      # A conflict is "found" if Gold names the file and at least one of the conflicting
      # Howlers in its output. Partial credit: finding the file but not all Howlers = 0.5 per conflict.
    score_range: [0.0, 1.0]
    threshold_pass: 1.0
    description: >
      Gold must detect every file that is claimed by two or more Howlers in the
      scenario's decomposition. The threshold is 1.0 (perfect recall) because a
      missed file conflict is a direct spectrum failure mode — it leads to merge
      conflicts and lost work. False positives (claiming a conflict where none exists)
      are captured in the human partial_credit note but do not reduce this score.
    partial_credit_notes: >
      If Gold correctly identifies the conflicting file but assigns it to only one
      of the two conflicting Howlers (i.e., resolves the conflict rather than just
      flagging it), award 0.75 per conflict. If Gold flags the wrong file as a conflict,
      it does not count toward conflicts_found.

  - id: "muster_dag_edge_accuracy"
    name: "DAG Edge Accuracy"
    weight: 0.15
    scoring_method: "automated"
    computation: |
      # expected_edges = set of (from_howler, to_howler) tuples from scenario.expected_dag_edges
      # found_edges = set of (from_howler, to_howler) tuples extracted from Gold's DAG output
      #   (Gold must emit a YAML DAG block; parser extracts edges from deps: fields)
      tp = len(found_edges & expected_edges)
      fp = len(found_edges - expected_edges)
      fn = len(expected_edges - found_edges)
      precision = tp / (tp + fp) if (tp + fp) > 0 else 1.0
      recall    = tp / (tp + fn) if (tp + fn) > 0 else 1.0
      # F1 is the item score; precision and recall are stored separately in result JSON
      score = 2 * precision * recall / (precision + recall) if (precision + recall) > 0 else 0.0
    score_range: [0.0, 1.0]
    threshold_pass: 0.90
    description: >
      Gold must construct a DAG that captures the correct dependency edges between Howlers.
      An edge (A → B) means B depends on A (B cannot start until A is complete or A signals
      #types). Edges are extracted from Gold's MANIFEST.md DAG YAML block by the output
      parser. Precision penalizes phantom edges (unnecessary sequencing); recall penalizes
      missing edges (parallelism incorrectly assumed). Both are stored; F1 is the item score.
      A phantom edge on a checkpoint dep (A#types → B) is a precision error of weight 0.5
      (partial, because the dependency exists but is overstated).

  - id: "muster_contract_completeness"
    name: "CONTRACT.md Completeness"
    weight: 0.17
    scoring_method: "hybrid"
    computation: |
      # Automated part: structural presence check
      # expected_sections from scenario.expected_contract_sections (list of required section names)
      # found_sections = sections detected in Gold's CONTRACT.md by heading/keyword search
      structural_score = len(found_sections & expected_sections) / len(expected_sections)

      # expected_howlers = list of Howler names from scenario
      # For each Howler H, check Gold's CONTRACT.md for:
      #   - at least one precondition block referencing H
      #   - at least one postcondition block referencing H
      #   - at least one invariant block referencing H (only required for Howlers
      #     classified as "interface-heavy" in scenario.howler_metadata)
      howlers_with_precondition  = count(Howlers where CONTRACT.md has precondition block for H)
      howlers_with_postcondition = count(Howlers where CONTRACT.md has postcondition block for H)
      interface_heavy_howlers    = count(Howlers where metadata.interface_heavy == true)
      howlers_with_invariant     = count(interface_heavy_howlers where CONTRACT.md has invariant)
      dbc_score = (
          (howlers_with_precondition / len(expected_howlers)) * 0.4 +
          (howlers_with_postcondition / len(expected_howlers)) * 0.4 +
          (howlers_with_invariant / max(interface_heavy_howlers, 1)) * 0.2
      )
      automated_score = 0.5 * structural_score + 0.5 * dbc_score
    human_criteria: >
      Reviewer checks that shared types listed in CONTRACT.md actually cover the
      interfaces described in the scenario's expected_contract_sections. Specifically:
      (1) Are all TypeScript types/interfaces that cross Howler boundaries defined?
          Score 1.0 if all are present, 0.5 if >50% present, 0.0 if <50% present.
      (2) Are naming conventions documented? Score 1.0 if yes, 0.0 if absent.
      Human score = average of (1) and (2). Final score = 0.6 * automated_score + 0.4 * human_score.
    score_range: [0.0, 1.0]
    threshold_pass: 0.85
    description: >
      CONTRACT.md must include: shared type definitions, naming conventions, integration
      points, and Design-by-Contract sections (precondition/postcondition/invariant) for
      each Howler. The automated part checks structural presence. The human part checks
      that the content is substantively correct, not just that headings exist. A CONTRACT.md
      that has all headings but empty or placeholder content scores near 0 on the human part.

  - id: "muster_contract_precision"
    name: "CONTRACT.md Postcondition Testability"
    weight: 0.12
    scoring_method: "human"
    human_criteria: >
      For each postcondition statement in CONTRACT.md, the reviewer classifies it as:
        TESTABLE   — the statement is binary (pass/fail) and could be verified by an
                     automated check with no additional specification. Example:
                     "exports a function `processPayment(payload: PaymentPayload): Promise<Receipt>`"
        VAGUE      — the statement requires interpretation to verify. Example:
                     "the payment module should handle errors gracefully"
        ABSENT     — a Howler that should have postconditions has none.

      Score = count(TESTABLE) / (count(TESTABLE) + count(VAGUE) + count(ABSENT))
      where ABSENT counts as 1 per Howler missing postconditions.

      Reviewers must apply these classifications independently before comparing notes.
      If two reviewers disagree on TESTABLE vs VAGUE for a specific statement,
      treat it as VAGUE (conservative scoring). Disagreements are logged in the
      result JSON under human_review.disagreements.
    score_range: [0.0, 1.0]
    threshold_pass: 0.80
    description: >
      Postconditions in CONTRACT.md must be testable without additional interpretation.
      Vague prose postconditions ("handles errors well") are the primary failure mode
      for this item. The threshold of 0.80 allows some prose in justification sections
      without penalizing the entire CONTRACT.md, but the majority of postconditions
      must be binary-verifiable.

  - id: "muster_decomposition_soundness"
    name: "Decomposition Soundness"
    weight: 0.12
    scoring_method: "hybrid"
    computation: |
      # serial_tasks_expected = list of task IDs marked serial_risk: yes in scenario
      # serial_tasks_labeled  = task IDs that Gold marked with serial_risk: yes in MANIFEST.md
      serial_recall = (
          len(serial_tasks_labeled & serial_tasks_expected) / len(serial_tasks_expected)
          if len(serial_tasks_expected) > 0 else 1.0
      )
      # A task is "labeled" if its MANIFEST entry contains serial_risk: yes or equivalent
      # (e.g., "must run after X", "sequential", "blocked until X completes")
      automated_score = serial_recall
    human_criteria: >
      Reviewer assesses single-responsibility adherence for each Howler:
        PASS — the Howler's scope statement covers one cohesive domain and the
               file list is consistent with that domain. No Howler owns files
               from two unrelated domains (e.g., "auth logic" + "UI components").
        PARTIAL — minor scope creep: one or two files seem out-of-place but the
                  Howler's primary domain is clear.
        FAIL — the Howler's scope mixes two or more distinct domains that could
               each stand alone as separate Howlers.

      human_score = count(PASS) / len(expected_howlers)
                  + 0.5 * count(PARTIAL) / len(expected_howlers)
      Final score = 0.5 * automated_score + 0.5 * human_score
    score_range: [0.0, 1.0]
    threshold_pass: 0.85
    description: >
      Howler boundaries must follow single-responsibility: each Howler owns one cohesive
      domain. Serial dependencies must be correctly labeled in MANIFEST.md. The automated
      component measures serial labeling recall. The human component assesses whether
      each Howler's scope statement and file list represent a coherent unit of work.

  - id: "muster_politico_integration"
    name: "Politico Integration Quality"
    weight: 0.11
    scoring_method: "hybrid"
    computation: |
      # injected_issues = list of deliberate weaknesses in the scenario that Politico
      #   should catch (scenario.politico_injection: list of {issue_id, description, severity})
      # Automated: binary presence check
      politico_step_present = 1 if Gold's output contains evidence of a Politico review
          step (references to "Politico", "adversarial review", or "Phase 1.5") else 0
      issues_caught = count(injected issues where Gold's output or Politico output
          explicitly names or describes the issue within 20 tokens of the issue concept)
      catch_rate = issues_caught / len(injected_issues) if len(injected_issues) > 0 else 1.0
      automated_score = 0.3 * politico_step_present + 0.7 * catch_rate
    human_criteria: >
      Reviewer checks whether Gold addressed each Politico finding:
        ADDRESSED   — Gold either fixes the issue or provides documented rationale for
                      accepting it (accepted-with-rationale pattern).
        IGNORED     — Gold mentions the Politico finding but takes no action and provides
                      no rationale.
        NOT_REACHED — the issue was not caught (already penalized in automated_score).

      human_score = count(ADDRESSED) / (count(ADDRESSED) + count(IGNORED))
          where NOT_REACHED items are excluded from this ratio (already in automated).
      If no issues were caught (catch_rate == 0), human_score = 0.
      Final score = 0.6 * automated_score + 0.4 * human_score
    score_range: [0.0, 1.0]
    threshold_pass: 0.80
    description: >
      Gold must include a Politico (adversarial review) step and the Politico must catch
      issues deliberately injected into the scenario. The scenario's politico_injection
      field lists the issues and their severity. The automated score measures presence and
      catch rate. The human score measures whether Gold properly addressed each finding
      (fixed it or documented a rationale). A Politico step that is present but catches
      nothing scores 0.3 (presence credit only).

# Weight verification (must sum to 1.0):
# 0.18 + 0.15 + 0.15 + 0.17 + 0.12 + 0.12 + 0.11 = 1.00
weight_sum_check: 1.00
