scenario_id: "white-01"
difficulty: "easy"
domain: "User profile utility + React component"
description: >
  New userProfile.ts utility and ProfileCard.tsx React component.
  Planted: null dereference on db.users.findOne result, userId logged on delete (PII leak).
  Clean: joinedAt.toLocaleDateString() looks risky but UserProfile type guarantees joinedAt is a Date.

planted_bugs:
  - bug_id: "bug-01"
    category: "null_dereference"
    severity: "blocker"
    location: "src/utils/userProfile.ts:11"
    description: >
      db.users.findOne() returns null when no user matches. The code immediately dereferences
      user.id, user.firstName, etc. on line 11 without a null check. If userId is invalid or
      the user has been deleted, this throws "Cannot read properties of null".
    expected_finding: |
      White should flag that user can be null after findOne() and that the code dereferences
      it without a guard. Should suggest a null check with a thrown error or early return.
    scoring:
      full_credit_if: "identifies the null dereference on the findOne result AND cites the correct lines (11-18 range) AND suggests a fix"
      partial_credit_if: "notes the null risk but wrong line or missing fix"
      no_credit_if: "misses the null check issue entirely"

  - bug_id: "bug-02"
    category: "security"
    severity: "blocker"
    location: "src/utils/userProfile.ts:52"
    description: >
      deleteUser() calls console.log(`User ${userId} deleted`). userId is an internal identifier
      that should not be logged to stdout — in production environments logs are typically
      shipped to external aggregators, making this a PII/sensitive data logging issue.
      Additionally, no error handling: if the update fails, the error silently propagates.
    expected_finding: |
      White should flag the console.log with userId as a security/logging concern.
      Bonus: also noting the missing error handling on the update is acceptable but not required
      for full credit on this bug.
    scoring:
      full_credit_if: "flags console.log with userId as a security or PII logging issue AND cites line 52"
      partial_credit_if: "flags console.log as bad practice but doesn't frame it as a security issue"
      no_credit_if: "misses the console.log entirely"

clean_elements:
  - element_id: "clean-01"
    location: "src/components/ProfileCard.tsx:14"
    description: >
      profile.joinedAt.toLocaleDateString() — looks like it could throw if joinedAt is
      undefined or a string, but UserProfile.joinedAt is typed as Date so this is fine
      given the type contract.
    expected_handling: "White should either accept this or not flag it as a blocker"
    false_positive_if: "White flags joinedAt.toLocaleDateString() as a blocker"

false_positive_threshold: 0.20
pass_threshold: 0.85
