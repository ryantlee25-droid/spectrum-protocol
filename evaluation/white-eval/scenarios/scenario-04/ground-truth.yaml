scenario_id: "white-04"
difficulty: "medium"
domain: "E-commerce dashboard API"
description: >
  Dashboard endpoint that enriches orders and view history with product details.
  Planted: N+1 query pattern (nested loops making per-item DB calls), missing null
  check on product after findById in getRecentlyViewed. Clean: getDashboardStats
  loading all orders into memory is acceptable for this use case.

planted_bugs:
  - bug_id: "bug-01"
    category: "n_plus_one"
    severity: "warning"
    location: "src/api/dashboard.ts:18"
    description: >
      getDashboard contains a nested loop: for each order, for each item in the order,
      it calls db.products.findById(item.productId). For a user with 10 orders of 5 items
      each, this is 50 individual DB queries. The outer loop itself is also an N+1 over orders.
      Should use a batch fetch: collect all productIds first, then db.products.findByIds([...])
      in a single query, then build a lookup map.
    expected_finding: |
      White should identify the N+1 query pattern in the nested loops of getDashboard.
      Should note the magnitude (orders × items queries) and suggest batch fetching.
    scoring:
      full_credit_if: "identifies N+1 query in nested loops AND cites getDashboard AND suggests batch fetch approach"
      partial_credit_if: "flags the loop as a performance issue but doesn't explain N+1 or batch fix"
      no_credit_if: "misses the N+1 pattern entirely"

  - bug_id: "bug-02"
    category: "null_dereference"
    severity: "blocker"
    location: "src/api/dashboard.ts:60"
    description: >
      In getRecentlyViewed, db.products.findById(view.productId) can return null if a
      product has been deleted since the user viewed it. The code then spreads null
      with `...product` on line 62, which throws "Cannot spread a non-object value".
      The getDashboard function has the same risk (product on line 22) but findById
      on a foreign key in an active order is less likely to return null.
      getRecentlyViewed is the clear case since products in view history are often stale.
    expected_finding: |
      White should flag the null dereference risk in getRecentlyViewed where findById
      may return null for a deleted product and the spread would throw.
      Should cite lines around 60-63 and suggest a null guard (skip or substitute placeholder).
    scoring:
      full_credit_if: "identifies null risk from findById in getRecentlyViewed AND cites the spread as the crash point AND suggests a fix"
      partial_credit_if: "flags null risk in the function but doesn't pinpoint the spread or cites wrong function"
      no_credit_if: "misses the null dereference in getRecentlyViewed"

clean_elements:
  - element_id: "clean-01"
    location: "src/api/dashboard.ts:40"
    description: >
      getDashboardStats loads all completed orders for the user to compute totalSpend.
      For most users this is fine — order counts are bounded per-user. A reviewer might
      flag this as an N+1 or memory issue but it's actually fine given the domain context.
    expected_handling: "White may note it as a suggestion but should not flag as a warning or blocker"
    false_positive_if: "White flags getDashboardStats order loading as a blocker or warning"

false_positive_threshold: 0.20
pass_threshold: 0.85
