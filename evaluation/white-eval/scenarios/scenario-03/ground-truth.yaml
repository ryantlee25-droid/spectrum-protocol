scenario_id: "white-03"
difficulty: "medium"
domain: "Blog post pagination API"
description: >
  Express handlers for paginated post listing. Planted: off-by-one in offset calculation
  (page * limit instead of (page-1) * limit skips the first page), no validation that page >= 1
  allows negative offsets. Clean: Math.ceil for totalPages is correct even when totalCount is 0.

planted_bugs:
  - bug_id: "bug-01"
    category: "off_by_one"
    severity: "blocker"
    location: "src/api/posts.ts:25"
    description: >
      The offset is calculated as `page * limit` (line 25). Since pages are 1-indexed
      (documented in the comment: "page=1 is the first page"), the correct formula is
      `(page - 1) * limit`. With the current code, requesting page=1 skips the first 20
      records and returns records 21-40. Page=0 would be needed to see records 1-20,
      but page defaults to 1. This means the first page of results is never returned.
      The same bug exists in getPostsByTag at line 70.
    expected_finding: |
      White should flag that offset = page * limit is wrong for 1-indexed pagination.
      Should note the correct formula is (page - 1) * limit.
      Should cite line 25 (and ideally line 70 as well).
    scoring:
      full_credit_if: "identifies the off-by-one in offset formula AND cites line 25 AND gives the correct formula"
      partial_credit_if: "identifies the offset is wrong but wrong line number or missing correct formula"
      no_credit_if: "misses the pagination bug entirely"

  - bug_id: "bug-02"
    category: "missing_validation"
    severity: "warning"
    location: "src/api/posts.ts:15"
    description: >
      page is parsed from req.query but there is no validation that page >= 1.
      If a caller passes page=0 or page=-5, the offset becomes 0 or negative.
      A negative skip value will likely cause a database error or return unexpected results
      depending on the ORM. Should validate page >= 1 after parseInt.
    expected_finding: |
      White should flag the missing validation that page must be >= 1.
      A warning-level finding is appropriate (not a blocker since the default handles
      the common case, but negative pages are an unhandled edge case).
    scoring:
      full_credit_if: "flags missing page >= 1 validation AND notes the consequence (negative offset or DB error)"
      partial_credit_if: "notes page validation is missing but doesn't explain consequence"
      no_credit_if: "misses the validation gap"

clean_elements:
  - element_id: "clean-01"
    location: "src/api/posts.ts:22"
    description: >
      Math.ceil(totalCount / limit) for totalPages — when totalCount is 0 this returns 0,
      which is correct. When totalCount is exactly divisible by limit it rounds correctly.
      This is fine.
    expected_handling: "White should not flag the totalPages calculation as incorrect"
    false_positive_if: "White flags the Math.ceil calculation as a blocker or warning"

false_positive_threshold: 0.20
pass_threshold: 0.85
