scenario_id: "white-05"
difficulty: "hard"
domain: "Frontend store architecture"
description: >
  CartStore and UserStore modules with a circular dependency between them.
  CartStore imports UserStore; UserStore imports CartStore. Planted: circular import
  causes runtime initialization failure (one constructor runs before the other's module
  is fully evaluated), and UserStore.logout calls cartStore.clearCart() which doesn't
  exist in the initial CartStore version (added in a second diff hunk — but the first
  version of UserStore.ts references it before clearCart is defined).
  Clean: localStorage usage in CartStore is a reasonable persistence strategy.

planted_bugs:
  - bug_id: "bug-01"
    category: "circular_dependency"
    severity: "blocker"
    location: "src/modules/cart/CartStore.ts:1 and src/modules/user/UserStore.ts:1"
    description: >
      CartStore imports UserStore (`import { UserStore } from '../user/UserStore'`) and
      UserStore imports CartStore (`import { CartStore } from '../cart/CartStore'`).
      This is a circular dependency. In a CommonJS/Node module system, one module will
      receive an empty object during initialization. In ES modules with bundlers
      (webpack/vite), circular deps cause one class to be undefined at construction time,
      leading to "CartStore is not a constructor" or "UserStore is not a constructor"
      errors depending on initialization order. This is an architectural blocker —
      the coupling must be broken (e.g., via an event bus, dependency injection, or
      restructuring so only one depends on the other).
    expected_finding: |
      White should identify the circular dependency between CartStore and UserStore.
      Should note both import lines and explain why this causes a runtime failure.
      Should suggest a fix: event bus, DI container, or restructuring the dependency direction.
    scoring:
      full_credit_if: "identifies the circular dependency AND names both modules AND explains the runtime failure mode AND suggests a fix"
      partial_credit_if: "identifies circular dependency but only names one module or missing explanation of failure"
      no_credit_if: "misses the circular dependency entirely"

  - bug_id: "bug-02"
    category: "missing_error_handling"
    severity: "warning"
    location: "src/modules/user/UserStore.ts:21"
    description: >
      UserStore.login() calls authApi.login() which is async and can throw (network error,
      401 unauthorized, etc.). The method is async but has no try/catch. If authApi.login
      throws, the error propagates to the caller uncaught. The caller (UI component) would
      need to handle it, but since this is a store method it should handle auth errors
      internally and set an error state, or at minimum document that callers must catch.
      Currently the method signature and body give no indication it can fail.
    expected_finding: |
      White should flag the missing error handling in UserStore.login() for the authApi call.
      Should note that the async method can throw and currently has no try/catch.
    scoring:
      full_credit_if: "flags missing try/catch in login() AND explains the consequence (unhandled throw) AND suggests error handling pattern"
      partial_credit_if: "notes error handling is missing but doesn't explain what can throw or why it matters"
      no_credit_if: "misses the missing error handling in login"

clean_elements:
  - element_id: "clean-01"
    location: "src/modules/cart/CartStore.ts:36"
    description: >
      localStorage.setItem in persistCart() — using localStorage for cart persistence is
      a reasonable approach for a frontend store. Not a security issue in this context.
    expected_handling: "White should not flag localStorage usage as a blocker or warning in this context"
    false_positive_if: "White flags localStorage.setItem as a security blocker"

false_positive_threshold: 0.20
pass_threshold: 0.85
