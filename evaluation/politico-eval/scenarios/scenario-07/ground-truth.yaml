scenario_id: "politico-07"
difficulty: "hard"
domain: "event-driven microservice"
description: >
  6-Howler event-driven service with Kafka producer, consumer, schema registry, DLQ,
  monitoring, and deployment. Three hard-to-find bugs: docker-compose.yml referenced in
  deployment task but absent from ownership matrix and needed by monitoring too,
  EventEnvelope.payload typed as 'unknown' causing incompatible producer/consumer
  implementations, and howler-dlq parallel to howler-consumer despite DLQ routing
  depending on consumer error classification constants. Clean element: Kafka topic
  name constants are consistently defined in CONTRACT.md.

planted_bugs:
  - bug_id: "bug-01"
    category: "ownership_gap"
    severity: "blocker"
    location: "MANIFEST.md file ownership matrix and task description"
    description: >
      The howler-deployment task description states "Write Kubernetes manifests, Helm chart
      values, and docker-compose for local development." docker-compose.yml (or
      docker-compose.yaml) is explicitly included in the scope but does not appear in the
      file ownership matrix — only k8s/ and helm/ files are listed. This is a gap within
      howler-deployment's own matrix. More critically, howler-monitoring's postconditions
      state that metrics are "exposed at /metrics endpoint (Prometheus scrape format)" —
      for local development, Prometheus itself must be run alongside the service, which
      requires docker-compose to include a Prometheus container. howler-monitoring's
      developer-experience requires docker-compose to include monitoring infrastructure
      (Prometheus, optionally Grafana). Both howler-deployment (owns it) and howler-monitoring
      (needs to extend it with Prometheus config) effectively need to write to docker-compose.yml.
    expected_finding: |
      Politico should flag that docker-compose.yml is mentioned in howler-deployment's task
      scope but absent from the ownership matrix. Additionally, howler-monitoring's local
      development workflow requires Prometheus to be in docker-compose — but if howler-deployment
      owns docker-compose.yml and howler-monitoring is parallel to howler-deployment, both
      Howlers may write to the same file (a file ownership conflict). Either docker-compose.yml
      should be in the matrix owned by howler-deployment with a note that howler-monitoring's
      Prometheus config is a sequential addition, or howler-monitoring should depend on
      howler-deployment to extend the file.
    scoring:
      full_credit_if: >
        Names docker-compose.yml as missing from the ownership matrix AND identifies
        that both howler-deployment and howler-monitoring need to write to it (conflict)
        AND suggests a resolution (sequential dep or single owner with documented extension)
      partial_credit_if: >
        Notes docker-compose.yml is missing from the matrix without identifying the
        dual-Howler write conflict with howler-monitoring
      no_credit_if: >
        Accepts the file ownership matrix as complete for howler-deployment, or flags
        docker-compose only as a minor omission without recognizing the ownership conflict

  - bug_id: "bug-02"
    category: "contract_ambiguity"
    severity: "blocker"
    location: "CONTRACT.md — EventEnvelope.payload field type"
    description: >
      EventEnvelope.payload is typed as `unknown` with the comment "Avro-serialized;
      deserialized shape depends on schemaRef." This is the core event type that flows
      from howler-producer to howler-consumer — it is the most critical seam in the
      entire system. The ambiguity has two dimensions:
      (1) At PRODUCE time: howler-producer's serializer.ts must take a domain event,
      Avro-serialize it, and set payload. The invariant says "EventEnvelope.payload is
      the Avro-serialized form of the domain event — never a plain JS object." So at
      produce time, payload is a Buffer (Avro bytes). But the TypeScript type is `unknown`,
      not `Buffer`.
      (2) At CONSUME time: howler-consumer's deserializer.ts returns an EventEnvelope.
      After deserialization, payload would be the decoded JS object (not the Avro bytes
      anymore). So the same EventEnvelope type means payload is Buffer in the producer
      and a decoded object in the consumer.
      Two Howlers implementing against `payload: unknown` could create incompatible
      expectations: howler-producer treats payload as Buffer, howler-consumer treats
      it as a domain object after deserialization — but both use the same EventEnvelope type.
      This will cause TypeScript to accept both implementations while they are behaviorally
      incompatible at the seam.
    expected_finding: |
      Politico should flag that EventEnvelope.payload typed as `unknown` is insufficient
      for a type-safe producer/consumer seam. The producer sets payload to Avro-encoded
      Buffer bytes; the consumer reads payload as a deserialized domain object. These are
      different types at runtime, but both are typed as `unknown` — TypeScript will accept
      both implementations without warning. The contract should either: (a) define two
      distinct envelope types (ProducerEnvelope with payload: Buffer and ConsumerEnvelope
      with payload: Record<string, unknown>), or (b) use a generic EventEnvelope<T> with
      payload: T, where the producer uses EventEnvelope<Buffer> and consumer uses
      EventEnvelope<DomainEvent>.
    scoring:
      full_credit_if: >
        Names EventEnvelope.payload: unknown as the ambiguity AND distinguishes the
        produce-time (Buffer) and consume-time (decoded object) interpretations AND
        traces why TypeScript accepts both silently AND suggests a concrete fix
        (two types or generic)
      partial_credit_if: >
        Notes that payload: unknown is too loose without distinguishing the produce vs.
        consume semantics, or identifies the fix without explaining the TypeScript
        acceptance problem
      no_credit_if: >
        Accepts payload: unknown as appropriate for Avro payloads (treating it as
        deliberate flexibility), or notes it only as a style concern

  - bug_id: "bug-03"
    category: "decomposition_flaw"
    severity: "blocker"
    location: "MANIFEST.md DAG — howler-dlq dependency on howler-consumer#types"
    description: >
      howler-dlq depends on howler-consumer#types (STABLE checkpoint). This looks
      correct — DLQ needs the ConsumerError type to build failure envelopes. The flaw:
      howler-dlq's routing logic must decide WHICH errors go to the DLQ. The
      DlqEnvelope.retryEligible field is set based on whether errorClass is "poison"
      or not. howler-dlq's invariant states: "Only ConsumerError with errorClass == 'poison'
      or errorClass == 'retriable' are routed to DLQ." This filtering logic depends on
      the SEMANTICS of ConsumerErrorClass — specifically, what "poison" means in practice.
      howler-consumer's error-classifier.ts implements classifyError(), which makes the
      determination. The #types checkpoint exports the ConsumerErrorClass enum values,
      but the behavioral contract (when does classifyError return "poison" vs. "retriable"
      vs. "transient") is defined by howler-consumer's implementation, not the type.
      If howler-dlq and howler-consumer are implemented in parallel (after #types unblocks),
      howler-dlq's retry.ts and dlq-producer.ts will hardcode assumptions about which error
      classes reach the DLQ — assumptions that must match howler-consumer's actual
      classification behavior. A mismatch (e.g., howler-consumer classifies schema
      evolution failures as "retriable" but howler-dlq treats "retriable" as retry-eligible
      and routes them back to the main topic) will cause message loops silently.
    expected_finding: |
      Politico should flag that howler-dlq depends on howler-consumer#types but needs
      more than the type definition — it needs the behavioral contract of classifyError()
      to know which error classes will actually reach the DLQ and with what frequency.
      The invariant "Only poison or retriable errors are routed to DLQ" is implemented
      in howler-dlq, but the invariant "classifyError is deterministic for same inputs"
      is in howler-consumer. If both Howlers implement in parallel, howler-dlq's routing
      conditions may not match howler-consumer's actual classification boundaries (e.g.,
      what inputs produce "poison" vs. "retriable"). The dependency should be upgraded
      from howler-consumer#types to full howler-consumer completion, or the error
      classification boundary conditions must be specified in CONTRACT.md explicitly.
    scoring:
      full_credit_if: >
        Identifies that howler-dlq's routing logic depends on classifyError() semantics
        AND argues the #types checkpoint is insufficient (behavior, not just types, is needed)
        AND connects this to the message loop risk (mismatched classification leading to
        infinite retry cycles) AND recommends upgrading to full completion dep or adding
        behavioral spec to CONTRACT.md
      partial_credit_if: >
        Notes a behavioral dependency between howler-dlq and howler-consumer beyond
        the type checkpoint without tracing the message loop risk or recommending a fix
      no_credit_if: >
        Accepts howler-consumer#types as sufficient because ConsumerErrorClass enum is
        exported and both Howlers have access to the type definition

clean_elements:
  - element_id: "clean-01"
    location: "CONTRACT.md naming conventions — Kafka topic names"
    description: >
      Kafka topic names are defined as constants in src/producer/router.ts (owned by
      howler-producer) following the format "{service}.{entity}.{event}". DLQ topics
      follow "{original-topic}.dlq". This naming convention is consistently applied
      across all references in the contract: the integration points table, howler-dlq's
      DlqEnvelope.originalTopic field, and howler-monitoring's DLQ depth metric.
      This could look like a shared ownership problem (why does only howler-producer
      own the topic name constants if howler-dlq and howler-monitoring also reference
      them?) but it is correctly modeled: topic names are string constants derived from
      the naming convention, not shared TypeScript values that require a #types checkpoint.
      howler-dlq constructs DLQ topic names using the convention (appending ".dlq"),
      not by importing from howler-producer's router.ts.
    expected_handling: >
      Politico should accept the Kafka topic naming convention as consistently and
      correctly defined, or not mention it. Topic names as string conventions don't
      create file ownership conflicts.
    false_positive_if: >
      Politico flags Kafka topic name constants as a shared ownership problem, or says
      howler-dlq needs a dependency on howler-producer to import topic name constants
      (rather than constructing them from the documented naming convention)

false_positive_threshold: 0.20
pass_threshold: 0.85
