scenario_id: "politico-06"
difficulty: "hard"
domain: "billing system"
description: >
  6-Howler billing system: subscriptions, invoices, payments, webhooks, notifications,
  and a sequential integration Howler. Three planted bugs with a clean element: shared
  billing event types absent from the ownership matrix, PaymentIntent.amount ambiguous
  (cents vs dollars), and howler-webhooks parallel to howler-payments despite needing
  to register routes that depend on payment routes being defined first. Clean element:
  howler-integration's sequential dependency on all Howlers is correctly modeled.

planted_bugs:
  - bug_id: "bug-01"
    category: "ownership_gap"
    severity: "blocker"
    location: "MANIFEST.md file ownership matrix"
    description: >
      The CONTRACT.md defines BillingEvent and BillingEventType as shared types sourced
      from howler-webhooks (webhook.handler.ts). However, four Howlers EMIT billing events:
      howler-subscriptions emits subscription.created and subscription.updated (per its
      invariants), howler-invoices would need to emit invoice.created and invoice.paid,
      howler-payments processes payment outcomes, and howler-webhooks handles the full
      BillingEventType enum. The contract's naming conventions state "Events emitted via
      Node.js EventEmitter pattern; listeners registered in src/billing/router.ts."
      This means all Howlers that emit events need to import BillingEventType — but
      BillingEventType is defined in howler-webhooks' output (webhook.handler.ts).
      More critically: a shared event type file (e.g., src/billing/types/events.ts)
      containing BillingEventType and BillingEvent should logically exist as a foundation
      for all Howlers to import from, rather than four Howlers importing from howler-webhooks'
      internal handler file. No such shared types file appears in the ownership matrix,
      and howler-subscriptions has no dependency on howler-webhooks in the DAG.
    expected_finding: |
      Politico should flag that BillingEvent and BillingEventType are defined in
      howler-webhooks (webhook.handler.ts) but four Howlers need to emit typed events
      using BillingEventType. howler-subscriptions emits subscription.created and
      subscription.updated, howler-invoices emits invoice events — but neither depends
      on howler-webhooks in the DAG. The shared event type definitions should live in
      a standalone file (e.g., src/billing/types/events.ts) owned by a Howler that
      runs before the event emitters, not inside howler-webhooks' handler file. The
      current arrangement creates an implicit cross-Howler import dependency not
      captured in the DAG.
    scoring:
      full_credit_if: >
        Identifies that BillingEventType is defined in howler-webhooks but needed by
        Howlers (specifically howler-subscriptions) that have no dependency on
        howler-webhooks in the DAG AND suggests a shared events type file as the
        resolution AND names the DAG gap (missing dependency edge)
      partial_credit_if: >
        Notes that multiple Howlers need BillingEventType without tracing the specific
        DAG gap (howler-subscriptions has no dep on howler-webhooks) or suggesting
        a shared types file
      no_credit_if: >
        Accepts the BillingEvent definition in webhook.handler.ts as correct, or misses
        the cross-Howler import dependency entirely

  - bug_id: "bug-02"
    category: "contract_ambiguity"
    severity: "blocker"
    location: "CONTRACT.md — PaymentIntent.amount field"
    description: >
      PaymentIntent.amount is typed as `number` with the comment "Payment amount" and
      no units specified. The CONTRACT.md naming conventions section states "Monetary values:
      stored in cents (integer) throughout the system; amount fields are cents." However,
      PaymentIntent.amount is a Stripe-facing type — Stripe's API ALSO stores amounts in
      cents, but the comment says only "Payment amount" with no clarification. The ambiguity:
      the naming conventions section applies this rule system-wide, but PaymentIntent is the
      only type where the source of truth is an external API (Stripe). howler-payments creates
      PaymentIntents by calling Stripe's API, which returns amount in cents. howler-invoices
      has totalCents (explicit unit in the name). howler-subscriptions has priceMonthly in
      the comment "in cents." But PaymentIntent.amount has no unit in its name or comment.
      A developer reading the interface without the naming conventions section could reasonably
      interpret `amount: number` as dollars (matching how humans think about payment amounts),
      while howler-webhooks processing payment events would get Stripe's cents value.
      The invariant "Currency passed to Stripe is always lowercase" is specified but there is
      no matching invariant confirming "amount is always in cents" for PaymentIntent specifically.
    expected_finding: |
      Politico should flag that PaymentIntent.amount: number has no unit annotation and
      no explicit invariant confirming it stores cents (unlike Plan.priceMonthly which has
      "in cents" in its comment). The naming conventions section states "amount fields are
      cents" but this is easy to miss when implementing the Stripe integration — Stripe docs
      use cents but display values in dollars. The contract should either rename the field
      to amount_cents (matching the system-wide convention more explicitly) or add an
      invariant: "PaymentIntent.amount is always in cents; never converted to dollars before
      storage or transmission."
    scoring:
      full_credit_if: >
        Names PaymentIntent.amount specifically AND contrasts it with other fields that
        have explicit unit annotations (priceMonthly "in cents", totalCents) AND notes
        the Stripe API complication (Stripe uses cents but developer UX expects dollars)
        AND suggests a concrete fix (rename or add invariant)
      partial_credit_if: >
        Notes that amount lacks unit annotation without comparing to other fields or
        addressing the Stripe API specifics
      no_credit_if: >
        Accepts the naming conventions section as sufficient to cover PaymentIntent.amount,
        or does not distinguish this field from other correctly-annotated monetary fields

  - bug_id: "bug-03"
    category: "decomposition_flaw"
    severity: "blocker"
    location: "MANIFEST.md DAG — howler-webhooks parallel to howler-payments"
    description: >
      howler-webhooks depends on howler-payments#types, which appears to correctly capture
      the type dependency (needs PaymentIntent type). The DAG looks well-formed. The flaw:
      howler-webhooks' postconditions include `webhook.routes.ts` exporting "Express Router
      with POST / that validates signature and calls handleEvent." This webhook route must
      be registered at a specific path in the billing router. The integration points table
      shows "howler-webhooks | howler-integration | Webhook routes registration | howler-integration
      mounts webhook.routes.ts at /billing/webhooks." However, Stripe webhooks must be
      registered (via Stripe Dashboard or API) pointing to a specific URL. If howler-webhooks
      and howler-payments are parallel, and howler-payments' payment.routes.ts is not yet
      defined when howler-webhooks writes its handler, the webhook handler's processing logic
      may make assumptions about which payment routes exist. More critically: the webhook
      handler processes Stripe events for payment.succeeded and payment.failed — it needs to
      look up PaymentIntents created by howler-payments' service. If howler-payments'
      createPaymentIntent() is not finalized, howler-webhooks can't write meaningful webhook
      processing for payment events beyond type stubs. The #types checkpoint unblocks type
      access but not behavioral contracts about what payment states are valid to transition to.
    expected_finding: |
      Politico should flag that howler-webhooks depends on howler-payments#types (type
      checkpoint only) but its webhook handler processes payment lifecycle events (payment.succeeded,
      payment.failed) and must understand the payment state machine to implement correct
      event handling. The PaymentIntent status enum ("requires_payment_method", "processing",
      "succeeded", "canceled") defines the state transitions, but the behavioral invariants
      (e.g., when is a PaymentIntent in "processing" vs. "succeeded" state?) are determined
      by howler-payments' implementation of capturePayment() and retry logic. howler-webhooks
      needs more than the type definition — it needs the full behavioral contract of
      howler-payments' state machine, which requires full completion (not just #types).
    scoring:
      full_credit_if: >
        Identifies that howler-webhooks processes payment lifecycle events AND argues that
        the #types checkpoint is insufficient (behavioral state machine semantics are needed)
        AND recommends upgrading the dependency from howler-payments#types to full
        howler-payments completion
      partial_credit_if: >
        Notes a dependency insufficiency between howler-webhooks and howler-payments without
        specifically identifying the state machine behavioral dependency vs. the type-only checkpoint
      no_credit_if: >
        Accepts howler-payments#types as sufficient for howler-webhooks because the
        PaymentIntent type is defined in the contract, missing the behavioral contract gap

clean_elements:
  - element_id: "clean-01"
    location: "MANIFEST.md DAG — howler-integration sequential dependency on all Howlers"
    description: >
      howler-integration depends on full completion of all five billing Howlers. This could
      look over-constrained — why not let howler-integration start writing the router while
      some Howlers are still running? However, this is correctly modeled: howler-integration
      wires together all route registrations, creates the billingEvents EventEmitter, and
      initializes EmailService with it. It cannot write the final router.ts without all
      route files existing. The sequential dependency is legitimate and the decomposition
      rationale explains it. This is NOT an over-constrained critical path — it is the
      correct synthesis pattern for an integration Howler.
    expected_handling: >
      Politico should accept howler-integration's full-completion dependency as correctly
      designed, or not mention it. The integration Howler pattern is a known-good Spectrum
      decomposition for synthesis tasks.
    false_positive_if: >
      Politico flags howler-integration's sequential dependency as over-constrained or
      suggests that howler-integration could start with partial deps (e.g., howler-subscriptions
      only) and incrementally add routes

false_positive_threshold: 0.20
pass_threshold: 0.85
