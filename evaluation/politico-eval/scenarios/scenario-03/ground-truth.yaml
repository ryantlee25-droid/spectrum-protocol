scenario_id: "politico-03"
difficulty: "medium"
domain: "auth and session management"
description: >
  5-Howler TypeScript auth system with Drizzle ORM, Redis session store, and
  integration tests. Three planted bugs of increasing subtlety: shared db/schema.ts
  needed by both schema and session Howlers but only owned by one, SessionData.expires
  typed as Date | string causing serialization ambiguity, and howler-middleware parallel
  to howler-session despite needing the session store initialized first.

planted_bugs:
  - bug_id: "bug-01"
    category: "ownership_gap"
    severity: "blocker"
    location: "MANIFEST.md file ownership matrix"
    description: >
      src/db/schema.ts is owned by howler-schema. However, howler-session's postconditions
      state that the sessions table has columns including a user_id foreign key. howler-session
      creates the session store (store.ts) and is responsible for Redis-based session
      management — but the sessions TABLE in the database is defined in src/db/schema.ts
      (owned by howler-schema). This is correct so far. The gap: the Drizzle sessions
      table definition in src/db/schema.ts must be written by howler-schema, but
      howler-session's store.ts will need to import and use the sessionsTable Drizzle
      schema to perform database writes (creating a DB-backed sessions table alongside
      Redis). Neither the manifest nor the contract clarifies whether sessions are stored
      in Redis only or in both Redis and the DB. The sessions table DDL is in the
      migration, but if howler-session needs to write to it via Drizzle, it must import
      from src/db/schema.ts — creating a cross-Howler import that isn't modeled.
      More concretely: src/db/migrations/0001_users_sessions.sql is owned by howler-schema
      but howler-session's store will need to run or reference migrations — there is no
      migration runner ownership assigned.
    expected_finding: |
      Politico should flag that the database migration runner ownership is unassigned.
      src/db/migrations/0001_users_sessions.sql is created by howler-schema, but no
      Howler owns the migration execution (drizzle-kit migrate or equivalent). Additionally,
      howler-session's store may need to import sessionsTable from src/db/schema.ts for
      hybrid Redis+DB session storage — this cross-Howler import is undocumented in the
      integration points table.
    scoring:
      full_credit_if: >
        Identifies the migration runner ownership gap (no Howler runs drizzle-kit migrate)
        AND/OR identifies that howler-session importing from howler-schema's src/db/schema.ts
        is not modeled in the integration points table
      partial_credit_if: >
        Notes that migration execution is unaccounted for without connecting it to
        the howler-schema/howler-session boundary
      no_credit_if: >
        Accepts the schema ownership as complete, missing both the migration runner
        and the cross-Howler schema import

  - bug_id: "bug-02"
    category: "contract_ambiguity"
    severity: "blocker"
    location: "CONTRACT.md — SessionData.expires field type"
    description: >
      SessionData.expires is typed as `Date | string` with the comment "serialized as
      ISO string in Redis, parsed as Date in memory." This union type creates a genuine
      serialization ambiguity: howler-session's serializer.ts will write Date objects
      to Redis as strings, howler-middleware reads them back and attaches to req.session.
      AuthContext (owned by howler-auth) has `session: Pick<SessionData, "sessionId" | "expires">`.
      When howler-auth's loginUser() calls createSession(), the returned SessionData will
      have expires as a Date. But when howler-middleware reads the session from Redis via
      getSession(), expires comes back as a string (JSON.parse of an ISO string gives a
      string, not a Date). The AuthContext.session.expires type is therefore different
      depending on the code path — fresh session vs. deserialized session — and howler-tests
      will encounter both behaviors. TypeScript will accept both since the union allows it,
      but runtime comparisons (expires < new Date()) will silently break for the string case.
    expected_finding: |
      Politico should flag that SessionData.expires typed as Date | string creates a
      serialization contract ambiguity. howler-middleware deserializes sessions from Redis
      where expires is a JSON string, but howler-auth calls createSession() which returns
      a Date. AuthContext.session.expires will be Date in one code path and string in
      another. The contract should specify: expires is always Date in-memory and the
      serializer is responsible for converting; or expires is always string and callers
      must parse. The current union allows incompatible implementations.
    scoring:
      full_credit_if: >
        Names the Date | string union as the ambiguity AND traces the two code paths
        (createSession returns Date; getSession returns string after Redis deserialization)
        AND notes the runtime comparison risk (or AuthContext inheritance issue)
      partial_credit_if: >
        Notes that Date | string is ambiguous without tracing the specific divergent
        code paths or the downstream impact on AuthContext
      no_credit_if: >
        Accepts Date | string as a reasonable union type, or flags it only as a style
        preference rather than a contract enforcement issue

  - bug_id: "bug-03"
    category: "decomposition_flaw"
    severity: "blocker"
    location: "MANIFEST.md DAG — howler-middleware parallel execution"
    description: >
      howler-middleware depends on howler-auth#types and howler-session#types (both
      STABLE checkpoints). The DAG is well-formed syntactically. The flaw: howler-middleware's
      postconditions state that sessionMiddleware reads the session cookie and calls
      getSession() — a function that requires a live Redis connection. howler-session's
      preconditions require Redis to be available. In the test environment, howler-tests
      is sequential on all three Howlers — but howler-middleware is parallel with
      howler-session's FULL completion (not just #types). The middleware's session.ts
      imports getSession() from src/session/store.ts. If howler-session and howler-middleware
      are implemented in parallel and howler-middleware's tests (run by howler-tests) need
      to call sessionMiddleware, those tests require getSession() to exist and be functional.
      Since howler-tests depends on all three being complete, this is fine at test time.
      However, the runtime integration concern is different: the invariant "sessionMiddleware
      runs before requireAuth in all route stacks" means the route registration order
      matters. No Howler owns the route registration order — it would live in an app.ts
      or router.ts that doesn't appear in the ownership matrix.
    expected_finding: |
      Politico should flag that the middleware registration order ("sessionMiddleware runs
      before requireAuth in all route stacks") is an invariant in the contract but no
      Howler owns the file where this order is enforced. The integration point between
      howler-middleware and the application router is undocumented — there is no app.ts
      or router.ts in the ownership matrix where the middleware stack is assembled in the
      correct order. This is a hidden sequential dependency: the middleware ordering must
      be established before the application can run correctly.
    scoring:
      full_credit_if: >
        Identifies that no Howler owns the file where middleware registration order is
        enforced AND names the invariant (sessionMiddleware before requireAuth) AND
        notes the missing app.ts or router.ts from the ownership matrix
      partial_credit_if: >
        Notes the middleware ordering concern without identifying the missing ownership
        file, or identifies the missing file without connecting it to the ordering invariant
      no_credit_if: >
        Accepts the invariant as self-enforcing, or misses the gap between the stated
        invariant and the file ownership matrix

clean_elements:
  - element_id: "clean-01"
    location: "CONTRACT.md — JWT_SECRET environment variable"
    description: >
      Both howler-auth and howler-tests reference JWT_SECRET. This could look like a
      shared secret management problem — two Howlers reading the same environment variable
      with no defined owner. However, environment variables are not file ownership
      concerns; they are runtime configuration. The contract correctly lists JWT_SECRET
      as an environment variable (not a shared file), and howler-tests' conventions
      explicitly state "JWT secret handling is covered by CONTRACT.md — howler-tests
      reads JWT_SECRET from environment, not hardcoded." This is a clean pattern.
    expected_handling: >
      Politico should accept JWT_SECRET as correctly handled, or not mention it.
      Environment variables are not file ownership items.
    false_positive_if: >
      Politico flags JWT_SECRET as a shared ownership problem, or says it should be
      owned by one Howler and exported as a constant rather than read from environment

false_positive_threshold: 0.20
pass_threshold: 0.85
